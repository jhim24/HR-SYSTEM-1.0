<!DOCTYPE html>
<html>
<head>
<title>Settings - Employee Login</title>

<style>
body{
  font-family:Arial;
  background:#1e1e2f;
  color:white;
  padding:20px;
}

/* BOX */
.box{
  max-width:500px;
  margin:auto;
  background:#2c2c3e;
  padding:25px;
  border-radius:12px;
}

/* INPUT + SELECT (SAME SIZE) */
input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:14px;
}

/* BUTTON (SMALL) */
button{
  margin-top:15px;
  padding:8px 20px;
  border:none;
  border-radius:6px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
  font-weight:bold;
  display:block;
  margin-left:auto; /* align right */
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th{
  border:1px solid #555;
  padding:8px;
  text-align:center;
}
</style>

</head>

<body>

<div class="box">

<h2>🔐 Employee Login Settings</h2>

<select id="empSelect"></select>

<input id="username" placeholder="Username">
<input id="password" placeholder="Password">

<button onclick="saveUser()">Save</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Username</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

</div>

<script>

/* LOAD EMPLOYEES */
let employees = JSON.parse(localStorage.getItem("employees")) || [];

employees.forEach(e=>{
  empSelect.innerHTML += `<option>${e.fname} ${e.lname}</option>`;
});

/* LOAD USERS */
let users = JSON.parse(localStorage.getItem("users")) || [];

function saveUser(){

  let name = empSelect.value;

  let user = {
    name:name,
    username:username.value,
    password:password.value
  };

  users.push(user);

  localStorage.setItem("users",JSON.stringify(users));

  username.value="";
  password.value="";

  loadUsers();
}

function loadUsers(){

  userTable.innerHTML="";

  users.forEach(u=>{
    userTable.innerHTML+=`
    <tr>
      <td>${u.name}</td>
      <td>${u.username}</td>
    </tr>`;
  });
}

loadUsers();

</script>

</body>
</html>
