<!DOCTYPE html>
<html>
<head>
<title>Payroll History</title>
<style>
body {font-family:Arial; background:#111; color:white; padding:20px;}
table {width:100%; background:white; color:black; border-collapse:collapse;}
th,td {border:1px solid #ccc; padding:8px; text-align:center;}
button {padding:6px;}
</style>
</head>

<body>

<h2>Payroll History</h2>

<button onclick="debug()">🔍 Check Data</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Gross</th>
<th>Net</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

function load(){
  let data = JSON.parse(localStorage.getItem("payroll")) || [];

  table.innerHTML = "";

  if(data.length === 0){
    table.innerHTML = "<tr><td colspan='4'>NO DATA FOUND ❌</td></tr>";
    return;
  }

  data.forEach(p=>{
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.date}</td>
        <td>${p.gross}</td>
        <td>${p.net}</td>
      </tr>
    `;
  });
}

/* DEBUG */
function debug(){
  alert(localStorage.getItem("payroll"));
}

load();

</script>

</body>
</html>
