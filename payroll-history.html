<!DOCTYPE html>
<html>
<head>
<title>Payroll History</title>
<style>
body {font-family:Arial; background:#111; color:white; padding:20px;}
table {width:100%; background:white; color:black; border-collapse:collapse;}
th,td {border:1px solid #ccc; padding:8px; text-align:center;}
button {padding:6px;}
</style>
</head>

<body>

<h2>Payroll History</h2>

<button onclick="debug()">🔍 Check Data</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Gross</th>
<th>Net</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

function load(){
  <script>

function getData(){
  return JSON.parse(localStorage.getItem("payroll")) || [];
}

/* LOAD */
function load(){
  let data = getData();

  history.innerHTML = "";

  if(data.length === 0){
    history.innerHTML = "<tr><td colspan='4'>NO DATA</td></tr>";
    return;
  }

  data.forEach((p,i)=>{
    history.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.date || "-"}</td>
        <td>${p.gross}</td>
        <td>${p.net}</td>
        <td>
          <button onclick="view(${i})">View</button>
          <button onclick="del(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* VIEW */
function view(i){
  let data = getData();
  let p = data[i];

  details.style.display="block";

  detailsBody.innerHTML = `
    <tr>
      <td>${p.rate}</td>
      <td>${p.days}</td>
      <td>${p.ot}</td>
      <td>${p.holiday}</td>
      <td>${p.sick}</td>
      <td>${p.birthday}</td>
      <td>${p.vacation}</td>
      <td>${p.gross}</td>
      <td>${p.sss}</td>
      <td>${p.pagibig}</td>
      <td>${p.philhealth}</td>
      <td>${p.healthcard}</td>
      <td>${p.othername} (${p.other})</td>
      <td>${p.totalDed}</td>
      <td>${p.net}</td>
    </tr>
  `;
}

/* DELETE */
function del(i){
  let data = getData();

  if(confirm("Delete?")){
    data.splice(i,1);
    localStorage.setItem("payroll", JSON.stringify(data));
    load();
    details.style.display="none";
  }
}

/* CLEAR */
function clearAll(){
  if(confirm("Clear all?")){
    localStorage.removeItem("payroll");
    load();
    details.style.display="none";
  }
}

/* BACK */
function goBack(){
  window.location.href = "index.html";
}

/* INIT */
load();

</script>
</body>
</html>
