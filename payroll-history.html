<!DOCTYPE html>
<html>
<head>
  <title>Payroll History</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#2c5364,#00c9ff);
  padding:20px;
  color:white;
}

/* TOP BAR */
.top-bar {
  margin-bottom:10px;
}

.back-btn {
  background:#34495e;
  color:white;
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.back-btn:hover {
  background:#2c3e50;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

th, td {
  padding:8px;
  border:1px solid #ccc;
  text-align:center;
}

th {
  background:#2ecc71;
  color:white;
}

/* BUTTON */
button {
  padding:5px 10px;
  cursor:pointer;
  border:none;
  border-radius:5px;
}

.view {
  background:#3498db;
  color:white;
}

</style>

</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()">⬅ Back to Dashboard</button>
</div>

<h2>Payroll History</h2>

<!-- MAIN TABLE -->
<div class="card">
<table>
<tr>
<th>Name</th>
<th>Emp ID</th>
<th>Salary</th>
<th>Net Pay</th>
<th>Action</th>
</tr>
<tbody id="history"></tbody>
</table>
</div>

<!-- DETAILS TABLE -->
<div class="card" id="details" style="display:none;">
<h3>Payroll Details</h3>

<table>
<tr>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Other</th>
<th>Total Deduction</th>
</tr>

<tr>
<td id="d_sss"></td>
<td id="d_pagibig"></td>
<td id="d_philhealth"></td>
<td id="d_other"></td>
<td id="d_total"></td>
</tr>
</table>

</div>

<script>
let data = JSON.parse(localStorage.getItem("payrollHistory")) || [];

/* LOAD TABLE */
function load(){
  history.innerHTML="";

  data.forEach((p,i)=>{
    history.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.empid}</td>
        <td>${p.salary}</td>
        <td>${p.net}</td>
        <td><button class="view" onclick="view(${i})">View</button></td>
      </tr>
    `;
  });
}

/* VIEW DETAILS */
function view(i){
  let p = data[i];

  details.style.display="block";

  d_sss.innerText = p.sss;
  d_pagibig.innerText = p.pagibig;
  d_philhealth.innerText = p.philhealth;
  d_other.innerText = p.other;
  d_total.innerText = p.totalDeduction;
}

/* BACK */
function goBack(){
  window.location.href="index.html";
}

load();
</script>

</body>
</html>
