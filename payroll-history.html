<!DOCTYPE html>
<html>
<head>
  <title>Payroll History</title>

<style>
body {
  font-family: Arial;
  background:#eef3ff;
  padding:20px;
}

h2 {
  text-align:center;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th {
  background:#2ecc71;
  color:white;
}

button {
  padding:5px 10px;
  cursor:pointer;
}
</style>

</head>
<body>

<h2>Payroll History</h2>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Employee ID</th>
        <th>Salary</th>
        <th>Net Pay</th>
        <th>View</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>
</div>

<div class="card" id="details" style="display:none;">
  <h3>Payroll Details</h3>
  <p><b>Name:</b> <span id="d_name"></span></p>
  <p><b>SSS:</b> <span id="d_sss"></span></p>
  <p><b>Pag-IBIG:</b> <span id="d_pagibig"></span></p>
  <p><b>PhilHealth:</b> <span id="d_philhealth"></span></p>
  <p><b>Other Deduction:</b> <span id="d_other"></span></p>
  <p><b>Total Deduction:</b> <span id="d_total"></span></p>
</div>

<script>
let payroll = JSON.parse(localStorage.getItem("payrollHistory")) || [];

/* DISPLAY */
function loadHistory() {
  let table = document.getElementById("historyTable");
  table.innerHTML = "";

  payroll.forEach((p,i) => {
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.empid}</td>
        <td>${p.salary}</td>
        <td>${p.net}</td>
        <td><button onclick="view(${i})">View</button></td>
      </tr>
    `;
  });
}

/* VIEW DETAILS */
function view(i) {
  let p = payroll[i];

  document.getElementById("details").style.display = "block";

  d_name.innerText = p.name;
  d_sss.innerText = p.sss;
  d_pagibig.innerText = p.pagibig;
  d_philhealth.innerText = p.philhealth;
  d_other.innerText = p.other;
  d_total.innerText = p.totalDeduction;
}

/* LOAD */
loadHistory();
</script>

</body>
</html>
