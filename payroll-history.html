<!DOCTYPE html>
<html>
<head>
  <title>Payroll History</title>

<style>
body {
  font-family: Arial;
  margin:0;
  padding:20px;
  background:#0f172a;
  color:white;
}

h2 { text-align:center; }

/* TOP BAR */
.top {
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.btn {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

.back { background:#334155; }
.clear { background:#dc2626; }
.view { background:#2563eb; }
.edit { background:#f59e0b; }
.delete { background:#dc2626; }

/* CARD */
.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  background:white;
  color:black;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th {
  background:#22c55e;
  color:white;
}

/* DETAILS */
#detailsBox {
  display:none;
}
</style>

</head>

<body>

<div class="top">
  <button class="btn back" onclick="goBack()">⬅ Back</button>
  <button class="btn clear" onclick="clearAll()">🗑 Clear All</button>
</div>

<h2>Payroll History</h2>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Gross</th>
<th>Net</th>
<th>Action</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>
</table>
</div>

<!-- DETAILS -->
<div class="card" id="detailsBox">
<h3>Payroll Details</h3>

<table>
<thead>
<tr>
<th>Rate</th>
<th>Days</th>
<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Birthday</th>
<th>Vacation</th>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health Card</th>
<th>Other</th>
<th>Total Deduction</th>
<th>Net</th>
</tr>
</thead>

<tbody id="detailsTable"></tbody>
</table>
</div>

<script>

/* ALWAYS GET FRESH DATA */
function getPayroll(){
  return JSON.parse(localStorage.getItem("payroll")) || [];
}

/* LOAD DATA */
function loadHistory(){
  let data = getPayroll();
  let table = document.getElementById("historyTable");

  table.innerHTML = "";

  if(data.length === 0){
    table.innerHTML = "<tr><td colspan='5'>No Payroll Data</td></tr>";
    return;
  }

  data.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.date || "-"}</td>
        <td>${p.gross}</td>
        <td>${p.net}</td>
        <td>
          <button class="btn view" onclick="viewRecord(${i})">View</button>
          <button class="btn edit" onclick="editRecord(${i})">Edit</button>
          <button class="btn delete" onclick="deleteRecord(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* VIEW DETAILS */
function viewRecord(index){
  let data = getPayroll();
  let p = data[index];

  document.getElementById("detailsBox").style.display = "block";

  document.getElementById("detailsTable").innerHTML = `
    <tr>
      <td>${p.rate}</td>
      <td>${p.days}</td>
      <td>${p.ot}</td>
      <td>${p.holiday}</td>
      <td>${p.sick}</td>
      <td>${p.birthday}</td>
      <td>${p.vacation}</td>
      <td>${p.sss}</td>
      <td>${p.pagibig}</td>
      <td>${p.philhealth}</td>
      <td>${p.healthcard}</td>
      <td>${p.othername} (${p.other})</td>
      <td>${p.totalDed}</td>
      <td>${p.net}</td>
    </tr>
  `;
}

/* DELETE */
function deleteRecord(index){
  let data = getPayroll();

  if(confirm("Delete this record?")){
    data.splice(index,1);
    localStorage.setItem("payroll", JSON.stringify(data));
    loadHistory();
    document.getElementById("detailsBox").style.display = "none";
  }
}

/* CLEAR ALL */
function clearAll(){
  if(confirm("Delete all payroll records?")){
    localStorage.removeItem("payroll");
    loadHistory();
    document.getElementById("detailsBox").style.display = "none";
  }
}

/* EDIT */
function editRecord(index){
  localStorage.setItem("editIndex", index);
  window.location.href = "payroll.html";
}

/* BACK */
function goBack(){
  window.location.href = "index.html";
}

/* INIT */
loadHistory();

</script>

</body>
</html>
