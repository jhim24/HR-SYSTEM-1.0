<!DOCTYPE html>
<html>
<head>
<title>Payroll History</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  padding:20px;
}

h2 { text-align:center; }

/* TOP */
.top {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.btn {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

.back { background:#6c757d; }
.clear { background:#dc3545; }

/* FILTER */
.filters {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input {
  padding:8px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* CARD */
.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  margin-bottom:15px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th {
  background:#0d6efd;
  color:white;
}

/* ACTION */
.view { background:#0d6efd; color:white; }
.edit { background:#ffc107; }
.delete { background:#dc3545; color:white; }
.print { background:#198754; color:white; }

/* DETAILS */
#detailsBox { display:none; }
</style>

</head>

<body>

<div class="top">
  <button class="btn back" onclick="goBack()">⬅ Back</button>
  <button class="btn clear" onclick="clearAll()">🗑 Clear All</button>
</div>

<h2>Payroll History</h2>

<!-- FILTER -->
<div class="filters">
  <input type="text" id="search" placeholder="Search Name..." onkeyup="loadHistory()">
  <input type="date" id="dateFilter" onchange="loadHistory()">
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Gross</th>
<th>Net</th>
<th>Action</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>
</table>
</div>

<!-- DETAILS -->
<div class="card" id="detailsBox">
<h3>Payroll Details</h3>

<button class="btn print" onclick="printDetails()">🖨 Print</button>

<table>
<thead>
<tr>
<th>Full Name</th>
<th>Rate</th>
<th>Days</th>
<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Birthday</th>
<th>Vacation</th>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health Card</th>
<th>Other</th>
<th>Total Deduction</th>
<th>Net</th>
</tr>
</thead>

<tbody id="detailsTable"></tbody>
</table>
</div>

<script>

function getPayroll(){
  return JSON.parse(localStorage.getItem("payroll")) || [];
}

/* LOAD WITH SEARCH + FILTER */
function loadHistory(){
  let data = getPayroll();
  let search = document.getElementById("search").value.toLowerCase();
  let date = document.getElementById("dateFilter").value;

  let table = document.getElementById("historyTable");
  table.innerHTML = "";

  data.forEach((p,i)=>{

    let matchName = p.name.toLowerCase().includes(search);
    let matchDate = !date || (p.date && p.date.includes(date));

    if(matchName && matchDate){
      table.innerHTML += `
        <tr>
          <td>${p.name}</td>
          <td>${p.date || "-"}</td>
          <td>${p.gross}</td>
          <td>${p.net}</td>
          <td>
            <button class="view" onclick="viewRecord(${i})">View</button>
            <button class="edit" onclick="editRecord(${i})">Edit</button>
            <button class="delete" onclick="deleteRecord(${i})">Delete</button>
          </td>
        </tr>
      `;
    }

  });
}

/* VIEW */
let currentData = null;

function viewRecord(i){
  let data = getPayroll();
  let p = data[i];
  currentData = p;

  document.getElementById("detailsBox").style.display="block";

  detailsTable.innerHTML = `
    <tr>
      <td>${p.name}</td>
      <td>${p.rate}</td>
      <td>${p.days}</td>
      <td>${p.ot}</td>
      <td>${p.holiday}</td>
      <td>${p.sick}</td>
      <td>${p.birthday}</td>
      <td>${p.vacation}</td>
      <td>${p.sss}</td>
      <td>${p.pagibig}</td>
      <td>${p.philhealth}</td>
      <td>${p.healthcard}</td>
      <td>${p.othername} (${p.other})</td>
      <td>${p.totalDed}</td>
      <td>${p.net}</td>
    </tr>
  `;
}

/* PRINT */
function printDetails(){
  let content = document.getElementById("detailsBox").innerHTML;
  let w = window.open();
  w.document.write(content);
  w.print();
}

/* DELETE */
function deleteRecord(i){
  let data = getPayroll();
  if(confirm("Delete?")){
    data.splice(i,1);
    localStorage.setItem("payroll", JSON.stringify(data));
    loadHistory();
  }
}

/* CLEAR */
function clearAll(){
  if(confirm("Clear all?")){
    localStorage.removeItem("payroll");
    loadHistory();
  }
}

/* EDIT */
function editRecord(i){
  localStorage.setItem("editIndex", i);
  window.location.href="payroll.html";
}

/* BACK */
function goBack(){
  window.location.href="index.html";
}

/* INIT */
loadHistory();

</script>

</body>
</html>
