<!DOCTYPE html>
<html>
<head>
  <title>Payroll History</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#2c5364,#00c9ff);
  padding:20px;
  color:white;
}

/* TOP BAR */
.top-bar {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.back-btn, .clear-btn {
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

.back-btn { background:#34495e; }
.clear-btn { background:#e74c3c; }

.back-btn:hover { background:#2c3e50; }
.clear-btn:hover { background:#c0392b; }

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

/* TABLE */
.table-box {
  overflow-x:auto;
}

table {
  width:100%;
  min-width:1400px;
  border-collapse:collapse;
  background:white;
  color:black;
  border-radius:10px;
}

th, td {
  padding:10px;
  border:1px solid #ccc;
  text-align:center;
  white-space:nowrap;
}

th {
  background:#2ecc71;
  color:white;
}

tr:hover {
  background:#f2f2f2;
}

/* BUTTONS */
button {
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.view { background:#3498db; color:white; }
.delete { background:#e74c3c; color:white; }

.view:hover { background:#2980b9; }
.delete:hover { background:#c0392b; }

/* DETAILS TABLE */
.details-title {
  margin-bottom:10px;
}
</style>

</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <button class="clear-btn" onclick="clearAll()">🗑 Clear All</button>
</div>

<h2>Payroll History</h2>

<!-- MAIN TABLE -->
<div class="card table-box">
<table>
<thead>
<tr>
<th>Name</th>
<th>Emp ID</th>
<th>Gross</th>
<th>Net Pay</th>
<th>Action</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

<!-- DETAILS TABLE -->
<div class="card table-box" id="details" style="display:none;">
<h3 class="details-title">Payroll Details</h3>

<table>
<thead>
<tr>
<th>Rate</th>
<th>Days</th>
<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Birthday</th>
<th>Vacation</th>
<th>Gross</th>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health Card</th>
<th>Other</th>
<th>Total Deduction</th>
<th>Net Pay</th>
</tr>
</thead>

<tbody id="detailsBody"></tbody>
</table>
</div>

<script>

let data = JSON.parse(localStorage.getItem("payrollHistory")) || [];

/* LOAD HISTORY */
function load(){

  let data = JSON.parse(localStorage.getItem("payroll")) || [];

  history.innerHTML = "";

  if(data.length === 0){
    history.innerHTML = "<tr><td colspan='4'>No Payroll Found</td></tr>";
    return;
  }

  data.forEach((p,i)=>{
    history.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.gross}</td>
        <td>${p.net}</td>
        <td>
          <button onclick="viewDetails(${i})">View</button>
          <button onclick="deleteItem(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}
/* VIEW DETAILS (TABLE STYLE) */
function viewDetails(i){
  let p = data[i];

  document.getElementById("details").style.display = "block";

  detailsBody.innerHTML = `
    <tr>
      <td>${p.rate || 0}</td>
      <td>${p.days || 0}</td>
      <td>${p.ot || 0}</td>
      <td>${p.holiday || 0}</td>
      <td>${p.sick || 0}</td>
      <td>${p.birthday || 0}</td>
      <td>${p.vacation || 0}</td>

      <td>${p.salary || 0}</td>

      <td>${p.sss || 0}</td>
      <td>${p.pagibig || 0}</td>
      <td>${p.philhealth || 0}</td>
      <td>${p.healthcard || 0}</td>
      <td>${p.other || 0}</td>

      <td>${p.totalDeduction || 0}</td>
      <td>${p.net || 0}</td>
    </tr>
  `;
}

/* DELETE ONE */
function deleteItem(i){
  if(confirm("Delete this record?")){
    data.splice(i,1);
    localStorage.setItem("payrollHistory", JSON.stringify(data));
    load();
    details.style.display="none";
  }
}

/* CLEAR ALL */
function clearAll(){
  if(confirm("Delete ALL history?")){
    localStorage.removeItem("payrollHistory");
    data = [];
    load();
    details.style.display="none";
  }
}

/* BACK */
function goBack(){
  window.location.href = "./index.html";
}

/* INIT */
load();

</script>

</body>
</html>
