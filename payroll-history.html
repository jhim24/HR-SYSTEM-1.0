<!DOCTYPE html>
<html>
<head>
  <title>Payroll History</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#2c5364,#00c9ff);
  padding:20px;
  color:white;
}

/* TOP BAR */
.top-bar { margin-bottom:10px; }

.back-btn {
  background:#34495e;
  color:white;
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.back-btn:hover { background:#2c3e50; }

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

/* TABLE */
.table-box {
  overflow-x:auto;
}

table {
  width:100%;
  min-width:1400px;
  border-collapse:collapse;
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

th, td {
  padding:8px;
  border:1px solid #ccc;
  text-align:center;
  white-space:nowrap;
}

th {
  background:#2ecc71;
  color:white;
}

/* BUTTON */
button {
  padding:5px 10px;
  cursor:pointer;
  border:none;
  border-radius:5px;
}

.view {
  background:#3498db;
  color:white;
}
</style>

</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()">⬅ Back to Dashboard</button>
</div>

<h2>Payroll History</h2>

<!-- MAIN TABLE -->
<div class="card table-box">
<table>
<thead>
<tr>
<th>Name</th>
<th>Emp ID</th>
<th>Salary</th>
<th>Net Pay</th>
<th>Action</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

<!-- FULL DETAILS -->
<div class="card table-box" id="details" style="display:none;">
<h3>Payroll Full Details</h3>

<table>
<thead>
<tr>
<th>Rate</th>
<th>Days</th>
<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Birthday</th>
<th>Vacation</th>
<th>Gross</th>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health Card</th>
<th>Other</th>
<th>Total Deduction</th>
<th>Net Pay</th>
</tr>
</thead>

<tbody>
<tr>
<td id="d_rate"></td>
<td id="d_days"></td>
<td id="d_ot"></td>
<td id="d_holiday"></td>
<td id="d_sick"></td>
<td id="d_birthday"></td>
<td id="d_vacation"></td>
<td id="d_gross"></td>
<td id="d_sss"></td>
<td id="d_pagibig"></td>
<td id="d_philhealth"></td>
<td id="d_healthcard"></td>
<td id="d_other"></td>
<td id="d_total"></td>
<td id="d_net"></td>
</tr>
</tbody>
</table>
</div>

<script>

/* LOAD DATA */
let data = JSON.parse(localStorage.getItem("payrollHistory")) || [];

/* LOAD TABLE */
function load(){
  let table = document.getElementById("history");
  table.innerHTML = "";

  if(data.length === 0){
    table.innerHTML = "<tr><td colspan='5'>No Payroll History</td></tr>";
    return;
  }

  data.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.name || ""}</td>
        <td>${p.empid || ""}</td>
        <td>${p.salary || ""}</td>
        <td>${p.net || ""}</td>
        <td>
          <button class="view" onclick="viewDetails(${i})">View</button>
        </td>
      </tr>
    `;
  });
}

/* VIEW FULL DETAILS */
function viewDetails(i){
  let p = data[i];

  document.getElementById("details").style.display = "block";

  document.getElementById("d_rate").innerText = p.rate || 0;
  document.getElementById("d_days").innerText = p.days || 0;
  document.getElementById("d_ot").innerText = p.ot || 0;
  document.getElementById("d_holiday").innerText = p.holiday || 0;
  document.getElementById("d_sick").innerText = p.sick || 0;
  document.getElementById("d_birthday").innerText = p.birthday || 0;
  document.getElementById("d_vacation").innerText = p.vacation || 0;

  document.getElementById("d_gross").innerText = p.salary || 0;

  document.getElementById("d_sss").innerText = p.sss || 0;
  document.getElementById("d_pagibig").innerText = p.pagibig || 0;
  document.getElementById("d_philhealth").innerText = p.philhealth || 0;
  document.getElementById("d_healthcard").innerText = p.healthcard || 0;
  document.getElementById("d_other").innerText = p.other || 0;

  document.getElementById("d_total").innerText = p.totalDeduction || 0;
  document.getElementById("d_net").innerText = p.net || 0;
}

/* BACK */
function goBack(){
  window.location.href = "./index.html";
}

/* INIT */
load();

</script>

</body>
</html>
