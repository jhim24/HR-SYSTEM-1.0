<!DOCTYPE html>
<html>
<head>
<title>Payslip System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#f0f0f0;
  padding:20px;
}

/* CONTROLS */
.controls{
  max-width:900px;
  margin:auto;
  margin-bottom:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select,button{
  padding:8px;
  cursor:pointer;
}

/* PAYSLIP */
.payslip{
  background:white;
  max-width:900px;
  margin:auto;
  padding:20px;
  border:4px solid #2c3e50;
}

.header{text-align:center;}
.sub{font-size:12px;color:#555;}

.title{
  background:#3c6fa5;
  color:white;
  padding:5px;
  margin-top:10px;
  font-size:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  font-size:12px;
}

.box{
  border:1px solid #ccc;
  padding:8px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:4px;
  border-bottom:1px solid #ddd;
}

.net{
  background:#2c3e50;
  color:white;
  padding:10px;
  text-align:center;
  margin-top:10px;
}

/* EMAIL MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:20px;
  width:300px;
}
</style>
</head>

<body>

<div class="controls">
<select id="emp"></select>

<select id="cutoff">
<option>Monthly</option>
<option>1-15</option>
<option>16-30</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="saveHistory()">Save</button>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="openEmail()">Send Email</button>
</div>

<div id="printArea" class="payslip">

<div class="header">
<h2>Payslip</h2>
<div class="sub">HR System</div>
</div>

<div class="title">Details</div>

<div class="grid">
<div class="box">
Name: <span id="name"></span><br>
Position: <span id="pos"></span>
</div>

<div class="box">
Period: <span id="period"></span><br>
Date: <span id="date"></span>
</div>
</div>

<div class="grid">

<div class="box">
<b>Earnings</b>
<table>
<tr><td>Basic</td><td id="basic"></td></tr>
<tr><td>OT</td><td id="ot"></td></tr>
<tr><td>Total</td><td id="earn"></td></tr>
</table>
</div>

<div class="box">
<b>Deductions</b>
<table>
<tr><td>SSS</td><td id="sss"></td></tr>
<tr><td>Loan</td><td id="loan"></td></tr>
<tr><td>Total</td><td id="ded"></td></tr>
</table>
</div>

</div>

<div class="net">NET: <span id="net"></span></div>

</div>

<!-- EMAIL MODAL -->
<div class="modal" id="emailModal">
  <div class="modal-box">
    <h3>Send Payslip</h3>
    <input id="email" placeholder="Enter email"><br><br>
    <button onclick="sendEmail()">Send</button>
  </div>
</div>

<script>

let empList = JSON.parse(localStorage.getItem("employees"))||[];
let payroll = JSON.parse(localStorage.getItem("payroll"))||[];
let history = JSON.parse(localStorage.getItem("payslipHistory"))||[];

function loadEmp(){
  emp.innerHTML="";
  empList.forEach(e=>{
    emp.innerHTML+=`<option>${e.fname} ${e.lname}</option>`;
  });
}

function generate(){

  let nameVal = emp.value;
  let p = payroll.find(x=>x.name===nameVal);
  if(!p){alert("No payroll");return;}

  let e = empList.find(x=>(x.fname+" "+x.lname)===nameVal)||{};

  let cut = cutoff.value;
  let mult = (cut==="Monthly")?1:0.5;

  let basicVal = p.gross * mult;
  let otVal = (p.ot||0)*mult;

  let earn = basicVal+otVal;
  let ded = (Number(p.sss||0)+Number(p.loan||0))*mult;

  name.innerText=nameVal;
  pos.innerText=e.position||"-";
  period.innerText=cut;
  date.innerText=new Date().toLocaleDateString();

  basic.innerText=basicVal;
  ot.innerText=otVal;
  earnEl.innerText=earn;

  sss.innerText=p.sss;
  loan.innerText=p.loan;
  dedEl.innerText=ded;

  net.innerText=earn-ded;

  window.currentPayslip = {name:nameVal,cut,net:earn-ded,date:new Date()};
}

/* SAVE HISTORY */
function saveHistory(){
  if(!window.currentPayslip){alert("Generate first");return;}
  history.push(window.currentPayslip);
  localStorage.setItem("payslipHistory",JSON.stringify(history));
  alert("Saved!");
}

/* PDF */
function downloadPDF(){
  html2pdf().from(document.getElementById("printArea")).save();
}

/* EMAIL */
function openEmail(){
  emailModal.style.display="flex";
}

function sendEmail(){
  alert("Payslip sent to "+email.value+" (simulation)");
  emailModal.style.display="none";
}

/* AUTO MONTHLY */
function autoGenerateMonthly(){
  let now=new Date().getDate();
  if(now===30){
    alert("Auto Monthly Payslip Generated");
  }
}

loadEmp();
autoGenerateMonthly();

</script>

</body>
</html>
