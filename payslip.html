<!DOCTYPE html>
<html>
<head>
  <title>Payslip</title>

<style>
body {
  font-family: Arial;
  background: #f0f0f0;
  padding: 20px;
}

.container {
  background: white;
  max-width: 800px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
}

/* HEADER */
.header {
  text-align: center;
  border-bottom: 2px solid #000;
  margin-bottom: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  margin-bottom: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #000;
  padding: 8px;
  text-align: center;
}

th {
  background: #eee;
}

/* BUTTON */
.print-btn {
  margin-top: 15px;
  padding: 10px;
  background: #2ecc71;
  color: white;
  border: none;
  cursor: pointer;
}

/* PRINT MODE */
@media print {
  .print-btn { display: none; }
  body { background: white; }
}
</style>

</head>
<body>

<div class="container">

  <div class="header">
    <h2>COMPANY NAME</h2>
    <p>Payslip</p>
  </div>

  <div class="grid">
    <div><b>Employee:</b> <span id="name"></span></div>
    <div><b>Date:</b> <span id="date"></span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Description</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody id="details"></tbody>
  </table>

  <button class="print-btn" onclick="window.print()">Print Payslip</button>

</div>

<script>
let payroll = JSON.parse(localStorage.getItem("payroll")) || [];

/* GET LAST RECORD */
let p = payroll[payroll.length - 1];

if(p){
  name.innerText = p.name;
  date.innerText = new Date().toLocaleDateString();

  details.innerHTML = `
    <tr><td>Gross Pay</td><td>${p.gross}</td></tr>
    <tr><td>SSS</td><td>${p.sss}</td></tr>
    <tr><td>Pag-IBIG</td><td>${p.pagibig}</td></tr>
    <tr><td>PhilHealth</td><td>${p.philhealth}</td></tr>
    <tr><td>Health Card</td><td>${p.healthcard}</td></tr>
    <tr><td>${p.othername}</td><td>${p.other}</td></tr>
    <tr><th>Total Deduction</th><th>${p.totalDed}</th></tr>
    <tr><th>Net Pay</th><th>${p.net}</th></tr>
  `;
}
</script>

</body>
</html>
