<!DOCTYPE html>
<html>
<head>
<title>Payslip</title>

<style>
body{
  font-family:Arial;
  background:#f0f0f0;
  padding:20px;
}

/* TOP CONTROLS */
.controls{
  max-width:800px;
  margin:auto;
  margin-bottom:15px;
  display:flex;
  gap:10px;
}

select,button{
  padding:8px;
}

/* CONTAINER */
.payslip{
  background:white;
  max-width:800px;
  margin:auto;
  padding:20px;
  border:4px solid #2c3e50;
}

/* HEADER */
.header{
  text-align:center;
}

.sub{font-size:12px;color:#555;}

.title{
  background:#3c6fa5;
  color:white;
  padding:5px;
  font-size:12px;
  margin-top:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  font-size:12px;
}

.box{
  border:1px solid #ccc;
  padding:8px;
}

table{
  width:100%;
  font-size:12px;
  border-collapse:collapse;
}

td{
  padding:4px;
  border-bottom:1px solid #ddd;
}

.net{
  background:#2c3e50;
  color:white;
  padding:10px;
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- CONTROLS -->
<div class="controls">
<select id="empSelect"></select>

<select id="cutoff">
  <option value="Monthly">Monthly</option>
  <option value="1-15">1–15</option>
  <option value="16-30">16–30</option>
</select>

<button onclick="generate()">Generate Payslip</button>
<button onclick="window.print()">Print</button>
</div>

<!-- PAYSLIP -->
<div class="payslip">

<div class="header">
  <h2>Payslip</h2>
  <div class="sub">HR System</div>
</div>

<div class="title">Employee & Payroll Details</div>

<div class="grid">
<div class="box">
Name: <span id="empName"></span><br>
Employee ID: <span id="empId"></span><br>
Position: <span id="position"></span>
</div>

<div class="box">
Pay Period: <span id="period"></span><br>
Pay Date: <span id="payDate"></span><br>
Bank: <span id="bank"></span>
</div>
</div>

<div class="grid">

<div class="box">
<b>Earnings</b>
<table>
<tr><td>Basic</td><td id="basic"></td></tr>
<tr><td>Overtime</td><td id="ot"></td></tr>
<tr><td>Holiday</td><td id="holiday"></td></tr>
<tr><td>Total</td><td id="earnTotal"></td></tr>
</table>
</div>

<div class="box">
<b>Deductions</b>
<table>
<tr><td>SSS</td><td id="sss"></td></tr>
<tr><td>Pagibig</td><td id="pagibig"></td></tr>
<tr><td>Philhealth</td><td id="phil"></td></tr>
<tr><td>Loan</td><td id="loan"></td></tr>
<tr><td>Total</td><td id="dedTotal"></td></tr>
</table>
</div>

</div>

<div class="net">
NET SALARY: <span id="net"></span>
</div>

</div>

<script>

let employees = JSON.parse(localStorage.getItem("employees")) || [];
let payroll = JSON.parse(localStorage.getItem("payroll")) || [];

/* LOAD EMPLOYEES */
function loadEmp(){
  empSelect.innerHTML="";
  employees.forEach(e=>{
    empSelect.innerHTML += `<option>${e.fname} ${e.lname}</option>`;
  });
}

/* GENERATE PAYSLIP */
function generate(){

  let name = empSelect.value;
  let cut = cutoff.value;

  let p = payroll.find(x => x.name === name);

  if(!p){
    alert("No payroll data");
    return;
  }

  let e = employees.find(x => (x.fname+" "+x.lname) === name) || {};

  empName.innerText = name;
  empId.innerText = e.empId || "-";
  position.innerText = e.position || "-";
  bank.innerText = e.bank || "-";

  period.innerText = cut;
  payDate.innerText = new Date().toLocaleDateString();

  /* CUT OFF LOGIC */
  let multiplier = (cut === "Monthly") ? 1 : 0.5;

  let basicVal = p.gross * multiplier;
  let otVal = (p.ot||0) * multiplier;
  let holidayVal = (p.holiday||0) * multiplier;

  basic.innerText = basicVal;
  ot.innerText = otVal;
  holiday.innerText = holidayVal;

  let earnTotal = basicVal + otVal + holidayVal;
  earnTotalEl = document.getElementById("earnTotal");
  earnTotalEl.innerText = earnTotal;

  let dedTotal =
    (Number(p.sss||0)+
    Number(p.pagibig||0)+
    Number(p.philhealth||0)+
    Number(p.loan||0)) * multiplier;

  document.getElementById("dedTotal").innerText = dedTotal;

  net.innerText = earnTotal - dedTotal;
}

/* INIT */
loadEmp();

</script>

</body>
</html>
