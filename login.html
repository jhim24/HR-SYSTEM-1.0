<!DOCTYPE html>
<html>
<head>
<title>HR System Login</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI';}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e0010,#330015,#0f0010);
}

/* CONTAINER */
.container{
  width:750px;
  height:420px;
  display:flex;
  border-radius:20px;
  overflow:hidden;

  /* 🔥 MAROON GLOW */
  box-shadow:
    0 0 20px #800000,
    0 0 40px rgba(128,0,0,0.6),
    inset 0 0 20px rgba(128,0,0,0.4);

  animation:float 4s ease-in-out infinite;
}

/* FLOAT */
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

/* LEFT IMAGE */
.left{
  flex:1;
  position:relative;

  background:url('hr-bg.jpg') no-repeat center center;
  background-size:cover;

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  padding:20px;
}

/* OVERLAY */
.left::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    135deg,
    rgba(128,0,0,0.6),
    rgba(0,0,0,0.5)
  );
}

/* TEXT */
.left span{
  position:relative;
  z-index:1;
  text-shadow:0 0 15px rgba(255,0,80,0.8);
}

/* RIGHT */
.right{
  flex:1;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:30px;
  color:white;
}

/* TITLE */
.right h2{
  text-align:center;
  margin-bottom:20px;
  text-shadow:0 0 10px #ff0040;
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  outline:none;

  background:rgba(255,255,255,0.1);
  color:white;

  /* 🔥 GLOW INPUT */
  box-shadow:0 0 8px rgba(255,0,80,0.3);
}

input::placeholder{
  color:#ddd;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  border-radius:8px;

  background:linear-gradient(45deg,#800000,#ff0040);
  color:white;
  font-weight:bold;
  cursor:pointer;

  transition:0.3s;

  /* 🔥 BUTTON GLOW */
  box-shadow:0 0 10px #ff0040;
}

button:hover{
  transform:scale(1.05);
  box-shadow:
    0 0 20px #ff0040,
    0 0 40px rgba(255,0,80,0.6);
}

</style>

</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
  <span>HR SYSTEM<br>WELCOME</span>
</div>

<!-- RIGHT -->
<div class="right">

<h2>LOGIN</h2>

<select id="mode">
  <option value="admin">Admin Login</option>
  <option value="employee">Employee Login</option>
</select>

<input id="username" placeholder="Username / Last Name">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

</div>

</div>

<script>

function login(){

  let u = document.getElementById("username").value.toLowerCase();
  let p = document.getElementById("password").value;
  let mode = document.getElementById("mode").value;

  /* ADMIN */
  if(mode==="admin"){
    if(u==="admin" && p==="1234"){
      localStorage.setItem("loggedIn","true");
      window.location.href="index.html";
    }else{
      alert("Invalid admin login");
    }
  }

  /* EMPLOYEE */
  if(mode==="employee"){
    let emp = JSON.parse(localStorage.getItem("employees")) || [];

    let found = emp.find(e =>
      (e.lname || "").toLowerCase() === u &&
      p === "1234"
    );

    if(found){
      localStorage.setItem("empSession", JSON.stringify(found));
      window.location.href="employee-portal.html";
    }else{
      alert("Invalid employee login");
    }
  }

}

</script>

</body>
</html>
