<!DOCTYPE html>
<html>
<head>
<title>HR System Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGIN BOX */
.box{
  background:rgba(255,255,255,0.2);
  padding:30px;
  border-radius:15px;
  width:280px;
  text-align:center;
  backdrop-filter:blur(10px);
}

h2{color:white;}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
}

/* SWITCH */
.switch{
  margin-top:10px;
  font-size:12px;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>HR SYSTEM</h2>

<!-- MODE -->
<select id="mode">
  <option value="admin">Admin Login</option>
  <option value="employee">Employee Login</option>
</select>

<input id="username" placeholder="Username / Full Name">
<input id="password" placeholder="Password / Employee ID">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

  let mode = document.getElementById("mode").value;
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  /* ADMIN LOGIN */
  if(mode === "admin"){

    if(user==="admin" && pass==="1234"){
      localStorage.setItem("loggedIn","true");
      window.location.href="index.html";
    }else{
      alert("Invalid admin login");
    }
  }

  /* EMPLOYEE LOGIN */
  if(mode === "employee"){

    let emp = JSON.parse(localStorage.getItem("employees"))||[];

    let found = emp.find(e =>
      (e.fname+" "+e.lname)===user &&
      e.empId===pass
    );

    if(found){
      localStorage.setItem("empSession", JSON.stringify(found));
      window.location.href="employee-portal.html";
    }else{
      alert("Invalid employee login");
    }
  }

}

</script>

</body>
</html>
