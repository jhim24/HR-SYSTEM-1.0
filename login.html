<!DOCTYPE html>
<html>
<head>
<title>HR System Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGIN BOX */
.box{
  background:rgba(255,255,255,0.2);
  padding:30px;
  border-radius:15px;
  width:280px;
  text-align:center;
  backdrop-filter:blur(10px);
}

h2{
  color:white;
  margin-bottom:10px;
}

/* SELECT */
select{
  width:100%;
  padding:8px;
  border-radius:5px;
  border:none;
  margin-bottom:5px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>HR SYSTEM</h2>

<select id="mode">
  <option value="admin">Admin Login</option>
  <option value="employee">Employee Login</option>
</select>

<input id="username" placeholder="Username / Last Name">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let found = users.find(x => x.username === u && x.password === p);

  if(found){

    localStorage.setItem("empSession", JSON.stringify({
      name: found.name
    }));

    window.location.href = "employee-portal.html";

  }else{
    alert("Invalid login");
  }
}
  /* EMPLOYEE LOGIN */
  if(mode === "employee"){

    let emp = JSON.parse(localStorage.getItem("employees")) || [];

    let found = emp.find(e =>
      (e.lname || "").toLowerCase() === user &&
      pass === "1234"
    );

    if(found){
      localStorage.setItem("empSession", JSON.stringify(found));
      window.location.href = "employee-portal.html";
    }else{
      alert("Invalid employee login");
    }

  }

}

</script>

</body>
</html>
