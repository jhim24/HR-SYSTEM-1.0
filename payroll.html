<!DOCTYPE html>
<html>
<head>
<title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#2c5364,#00c9ff);
  padding:20px;
  color:white;
}

.top {
  display:flex;
  justify-content:space-between;
}

.card {
  background: rgba(255,255,255,0.1);
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.form {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
}

input, select {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#e0e0e0;
}

button {
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:10px;
}

.save { background:#2ecc71; color:white; }

/* TABLE */
table {
  width:100%;
  background:white;
  color:black;
  border-collapse:collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#2ecc71; color:white; }
</style>

</head>

<body>

<div class="top">
<h2>Payroll (Connected)</h2>
<button onclick="goBack()">⬅ Back</button>
</div>

<div class="card">

<div class="form">

<!-- EMPLOYEE DROPDOWN -->
<select id="empSelect" onchange="loadEmployee()">
<option>Select Employee</option>
</select>

<input id="rate" type="number" placeholder="Rate">
<input id="days" type="number" placeholder="Days">

<input id="sss" type="number" placeholder="SSS">
<input id="pagibig" type="number" placeholder="Pag-IBIG">
<input id="philhealth" type="number" placeholder="PhilHealth">
<input id="healthcard" type="number" placeholder="Health Card">
<input id="other" type="number" placeholder="Other">

</div>

<button class="save" onclick="savePayroll()">Generate Payroll</button>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Days</th>
<th>Gross</th>
<th>Net</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>

</div>

<script>

/* LOAD EMPLOYEES */
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];
let payrollHistory = JSON.parse(localStorage.getItem("payrollHistory")) || [];

function loadEmployees(){
empSelect.innerHTML = "<option>Select Employee</option>";

employees.forEach((e,i)=>{
empSelect.innerHTML += `<option value="${i}">${e.firstname} ${e.lastname}</option>`;
});
}

/* LOAD ATTENDANCE */
function loadEmployee(){
let i = empSelect.value;
let emp = employees[i];

rate.value = emp.rate || 0;

/* OPTIONAL: AUTO DAYS FROM ATTENDANCE */
let record = attendance.find(a => a.empid == emp.empid);
if(record){
days.value = record.days || 0;
}
}

/* SAVE PAYROLL */
function savePayroll(){

let i = empSelect.value;
if(i==="Select Employee") return alert("Select employee");

let emp = employees[i];

let rate = +rate.value || 0;
let days = +days.value || 0;

let sss = +sss.value || 0;
let pagibig = +pagibig.value || 0;
let philhealth = +philhealth.value || 0;
let healthcard = +healthcard.value || 0;
let other = +other.value || 0;

/* COMPUTE */
let gross = rate * days;
let totalDed = sss + pagibig + philhealth + healthcard + other;
let net = gross - totalDed;

let rec = {
name: emp.firstname + " " + emp.lastname,
empid: emp.empid,
rate, days,
gross, net,
sss, pagibig, philhealth, healthcard, other,
date: new Date().toLocaleString()
};

/* SAVE HISTORY */
payrollHistory.push(rec);
localStorage.setItem("payrollHistory", JSON.stringify(payrollHistory));

display();
}

/* DISPLAY */
function display(){
tbl.innerHTML="";

payrollHistory.forEach(p=>{
tbl.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.rate}</td>
<td>${p.days}</td>
<td>${p.gross}</td>
<td>${p.net}</td>
</tr>
`;
});
}

/* BACK */
function goBack(){
window.location.href="index.html";
}

/* INIT */
loadEmployees();
display();

</script>

</body>
</html>
