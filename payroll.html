<!DOCTYPE html>
<html>
<head>
<title>Payroll</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

.wrapper{display:flex;height:100vh;}

.sidebar{
  width:240px;
  background:rgba(0,0,0,0.6);
  padding:20px;
}

.menu li{
  list-style:none;
  padding:10px;
  cursor:pointer;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

input,select{
  padding:5px;
  margin:3px;
  font-size:12px;
}

/* TABLE */
.table-box{
  background:#eaf4ff;
  padding:10px;
  border-radius:10px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  color:#2c3e50;
  font-size:12px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:#3c89b8;
  color:white;
}

.btn{
  padding:4px 6px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.save{background:#2ecc71;color:white;}
.edit{background:#3498db;color:white;}
.delete{background:#e74c3c;color:white;}
</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>HR System</h3>
<ul class="menu">
<li onclick="goPage('employee.html')">Employees</li>
<li onclick="goPage('attendance.html')">Attendance</li>
<li onclick="goPage('payroll.html')">Payroll</li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<h2>Payroll</h2>

<!-- FORM -->
<div>

<select id="emp"></select>

<input id="days" type="number" placeholder="Total Days">
<input id="rate" type="number" placeholder="Daily Rate">

<br>

<input id="ot" type="number" placeholder="Overtime">
<input id="holiday" type="number" placeholder="Holiday Pay">
<input id="sick" type="number" placeholder="Sick Leave">
<input id="bday" type="number" placeholder="Birthday Leave">
<input id="vacation" type="number" placeholder="Vacation Leave">

<br>

<input id="sss" placeholder="SSS">
<input id="pagibig" placeholder="Pag-IBIG">
<input id="philhealth" placeholder="PhilHealth">
<input id="health" placeholder="Health Card">
<input id="others" placeholder="Others Deduction">
<input id="loan" placeholder="Loan">

<button class="btn save" onclick="save()">Compute & Save</button>

</div>

<br>

<!-- TABLE -->
<div class="table-box">
<table id="tbl">
<thead>
<tr>
<th>Name</th>
<th>Days</th>
<th>Rate</th>
<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Bday</th>
<th>Vacation</th>
<th>SSS</th>
<th>Pagibig</th>
<th>Philhealth</th>
<th>Loan</th>
<th>Net Pay</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>
</div>

<script>
let empList = JSON.parse(localStorage.getItem("employees")) || [];
let payroll = JSON.parse(localStorage.getItem("payroll")) || [];
let editIndex = -1;

/* LOAD EMPLOYEES */
function loadEmp(){
  emp.innerHTML="";
  empList.forEach(e=>{
    let name = e.fname+" "+e.lname;
    emp.innerHTML += `<option>${name}</option>`;
  });
}

/* SAVE */
function save(){

  let name = emp.value;
  let daysVal = Number(days.value || 0);
  let rateVal = Number(rate.value || 0);

  let basic = daysVal * rateVal;

  let earnings =
    Number(ot.value||0) +
    Number(holiday.value||0) +
    Number(sick.value||0) +
    Number(bday.value||0) +
    Number(vacation.value||0);

  let deduction =
    Number(sss.value||0) +
    Number(pagibig.value||0) +
    Number(philhealth.value||0) +
    Number(health.value||0) +
    Number(others.value||0) +
    Number(loan.value||0);

  let net = basic + earnings - deduction;

  let row = {
    name,
    days:daysVal,
    rate:rateVal,
    ot:ot.value,
    holiday:holiday.value,
    sick:sick.value,
    bday:bday.value,
    vacation:vacation.value,
    sss:sss.value,
    pagibig:pagibig.value,
    philhealth:philhealth.value,
    loan:loan.value,
    net
  };

  if(editIndex === -1){
    payroll.push(row);
  } else {
    payroll[editIndex] = row;
    editIndex = -1;
  }

  localStorage.setItem("payroll", JSON.stringify(payroll));
  clearForm();
  render();
}

/* EDIT */
function editRow(i){
  let r = payroll[i];

  emp.value = r.name;
  days.value = r.days;
  rate.value = r.rate;
  ot.value = r.ot;
  holiday.value = r.holiday;
  sick.value = r.sick;
  bday.value = r.bday;
  vacation.value = r.vacation;
  sss.value = r.sss;
  pagibig.value = r.pagibig;
  philhealth.value = r.philhealth;
  loan.value = r.loan;

  editIndex = i;
}

/* DELETE */
function deleteRow(i){
  if(confirm("Delete?")){
    payroll.splice(i,1);
    localStorage.setItem("payroll", JSON.stringify(payroll));
    render();
  }
}

/* CLEAR */
function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

/* RENDER */
function render(){
  let tbody = document.querySelector("#tbl tbody");
  tbody.innerHTML="";

  payroll.forEach((r,i)=>{
    tbody.innerHTML += `
    <tr>
      <td>${r.name}</td>
      <td>${r.days}</td>
      <td>${r.rate}</td>
      <td>${r.ot}</td>
      <td>${r.holiday}</td>
      <td>${r.sick}</td>
      <td>${r.bday}</td>
      <td>${r.vacation}</td>
      <td>${r.sss}</td>
      <td>${r.pagibig}</td>
      <td>${r.philhealth}</td>
      <td>${r.loan}</td>
      <td>${r.net}</td>
      <td>
        <button class="btn edit" onclick="editRow(${i})">Edit</button>
        <button class="btn delete" onclick="deleteRow(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

function goPage(p){window.location.href=p;}

loadEmp();
render();
</script>

</body>
</html>
