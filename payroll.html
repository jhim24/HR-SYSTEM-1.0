<!DOCTYPE html>
<html>
<head>
  <title>Payroll System</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #0f2027, #2c5364, #00c9ff);
  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
}

/* TOP BAR */
.top-bar {
  margin-bottom: 15px;
}

.back-btn {
  background: #34495e;
  color: white;
  padding: 8px 15px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* FORM */
.form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 12px;
}

input, select {
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.9);
}

/* BUTTONS */
button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.save { background:#2ecc71; color:white; }
.update { background:#f39c12; color:white; }
.cancel { background:#7f8c8d; color:white; }
.delete { background:#e74c3c; color:white; }

/* TABLE */
.table-box {
  background: white;
  border-radius: 10px;
  padding: 10px;
  color: black;
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  min-width: 1400px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  font-size: 12px;
}

th {
  background: #2ecc71;
  color: white;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href="login.html";
}
</script>

</head>

<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<h2>PAYROLL SYSTEM</h2>

<div class="card">
  <div class="form">

    <select id="employee"></select>

    <input type="number" id="rate" placeholder="Rate per Day">
    <input type="number" id="days" placeholder="Total Days">

    <input type="number" id="ot" placeholder="Overtime">
    <input type="number" id="holiday" placeholder="Holiday">
    <input type="number" id="sick" placeholder="Sick Leave">
    <input type="number" id="birthday" placeholder="Birthday Leave">
    <input type="number" id="vacation" placeholder="Vacation Leave">

    <input type="number" id="sss" placeholder="SSS">
    <input type="number" id="pagibig" placeholder="Pag-IBIG">
    <input type="number" id="philhealth" placeholder="PhilHealth">
    <input type="number" id="healthcard" placeholder="Health Card">

    <input type="number" id="other" placeholder="Other Deduction">
    <input type="text" id="othername" placeholder="Other Name">

    <button class="save" onclick="savePayroll()">Save</button>
    <button class="update" onclick="updatePayroll()" id="updateBtn" style="display:none;">Update</button>
    <button class="cancel" onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancel</button>

  </div>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Days</th>
<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Birthday</th>
<th>Vacation</th>
<th>Gross</th>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health Card</th>
<th>Other</th>
<th>Total Deduction</th>
<th>Net Pay</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let payroll = JSON.parse(localStorage.getItem("payroll")) || [];
let editIndex = -1;

/* BACK */
function goBack(){
  window.location.href = "index.html";
}

/* LOAD EMPLOYEE */
function loadEmployees(){
  employee.innerHTML = "<option value=''>Select Employee</option>";
  employees.forEach((e,i)=>{
    employee.innerHTML += `<option value="${i}">${e.fname} ${e.lname}</option>`;
  });
}

/* COMPUTE */
function compute(){
  let gross = (+rate.value||0) * (
    (+days.value||0)+(+ot.value||0)+(+holiday.value||0)+
    (+sick.value||0)+(+birthday.value||0)+(+vacation.value||0)
  );

  let totalDed =
    (+sss.value||0)+(+pagibig.value||0)+(+philhealth.value||0)+
    (+healthcard.value||0)+(+other.value||0);

  return {gross, totalDed, net: gross-totalDed};
}

/* SAVE */
function savePayroll(){
  let i = employee.value;
  if(i==="") return alert("Select employee");

  let name = employees[i].fname + " " + employees[i].lname;
  let c = compute();

  let record = {
    name,
    rate:rate.value,
    days:days.value,
    ot:ot.value,
    holiday:holiday.value,
    sick:sick.value,
    birthday:birthday.value,
    vacation:vacation.value,
    sss:sss.value,
    pagibig:pagibig.value,
    philhealth:philhealth.value,
    healthcard:healthcard.value,
    other:other.value,
    othername:othername.value,
    gross:c.gross.toFixed(2),
    totalDed:c.totalDed.toFixed(2),
    net:c.net.toFixed(2)
  };

  payroll.push(record);
  localStorage.setItem("payroll", JSON.stringify(payroll));

  display();
  clearForm();
}

/* EDIT */
function editPayroll(i){
  let p = payroll[i];

  Object.keys(p).forEach(k=>{
    if(document.getElementById(k)){
      document.getElementById(k).value = p[k];
    }
  });

  editIndex = i;
  updateBtn.style.display="inline-block";
  cancelBtn.style.display="inline-block";
}

/* UPDATE */
function updatePayroll(){
  if(editIndex===-1) return;

  let c = compute();

  payroll[editIndex] = {
    ...payroll[editIndex],
    rate:rate.value,
    days:days.value,
    ot:ot.value,
    holiday:holiday.value,
    sick:sick.value,
    birthday:birthday.value,
    vacation:vacation.value,
    sss:sss.value,
    pagibig:pagibig.value,
    philhealth:philhealth.value,
    healthcard:healthcard.value,
    other:other.value,
    othername:othername.value,
    gross:c.gross.toFixed(2),
    totalDed:c.totalDed.toFixed(2),
    net:c.net.toFixed(2)
  };

  localStorage.setItem("payroll", JSON.stringify(payroll));

  display();
  cancelEdit();
}

/* CANCEL */
function cancelEdit(){
  editIndex=-1;
  clearForm();
  updateBtn.style.display="none";
  cancelBtn.style.display="none";
}

/* DELETE */
function del(i){
  if(confirm("Delete?")){
    payroll.splice(i,1);
    localStorage.setItem("payroll", JSON.stringify(payroll));
    display();
  }
}

/* DISPLAY */
function display(){
  payroll = JSON.parse(localStorage.getItem("payroll")) || [];
  table.innerHTML="";

  payroll.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.rate}</td>
        <td>${p.days}</td>
        <td>${p.ot}</td>
        <td>${p.holiday}</td>
        <td>${p.sick}</td>
        <td>${p.birthday}</td>
        <td>${p.vacation}</td>
        <td>${p.gross}</td>
        <td>${p.sss}</td>
        <td>${p.pagibig}</td>
        <td>${p.philhealth}</td>
        <td>${p.healthcard}</td>
        <td>${p.othername} (${p.other})</td>
        <td>${p.totalDed}</td>
        <td>${p.net}</td>
        <td>
          <button onclick="editPayroll(${i})">Edit</button>
          <button class="delete" onclick="del(${i})">Delete</button>
        </td>
      </tr>`;
  });
}

/* CLEAR */
function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  employee.value="";
}

/* INIT */
loadEmployees();
display();
</script>

</body>
</html>
