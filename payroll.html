<!DOCTYPE html>
<html>
<head>
<title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#e3f2fd,#ffffff);
  padding:20px;
}

/* HEADER */
.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

h2 { margin:0; color:#2c3e50; }

.back {
  padding:6px 12px;
  border:none;
  border-radius:5px;
  background:#2c3e50;
  color:white;
  cursor:pointer;
}

/* CARD */
.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* GRID */
.form {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:6px;
}

/* LABEL */
.label {
  grid-column: span 4;
  font-weight:bold;
  font-size:13px;
  color:#34495e;
  margin-top:5px;
}

/* INPUT */
input {
  padding:4px;
  font-size:11px;
  border-radius:5px;
  border:1px solid #ccc;
  height:26px;
}

/* BUTTON */
button {
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
}

.save { background:#27ae60; color:white; }
.update { background:#f39c12; }
.delete { background:#e74c3c; color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  font-size:11px;
}

th, td {
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}

th {
  background:#3498db;
  color:white;
}

tr:hover {
  background:#f2f2f2;
}
</style>

</head>

<body>

<div class="top">
  <h2>Payroll System</h2>
  <button class="back" onclick="goBack()">⬅ Back</button>
</div>

<div class="card">

<div class="form">

<div class="label">Employee</div>
<input id="name" placeholder="Name">
<input id="rate" type="number" placeholder="Rate">
<input id="days" type="number" placeholder="Days">

<div class="label">Leaves</div>
<input id="paidSick" type="number" placeholder="Paid Sick">
<input id="unpaidSick" type="number" placeholder="Unpaid Sick">
<input id="paidVacation" type="number" placeholder="Paid Vac">
<input id="unpaidVacation" type="number" placeholder="Unpaid Vac">
<input id="paidBirthday" type="number" placeholder="Paid Bday">
<input id="unpaidBirthday" type="number" placeholder="Unpaid Bday">

<div class="label">Extra</div>
<input id="ot" type="number" placeholder="OT">
<input id="holiday" type="number" placeholder="Holiday">

<div class="label">Deductions</div>
<input id="sss" type="number" placeholder="SSS">
<input id="pagibig" type="number" placeholder="Pag-IBIG">
<input id="philhealth" type="number" placeholder="PhilHealth">
<input id="healthcard" type="number" placeholder="Health Card">
<input id="othername" placeholder="Other Name">
<input id="other" type="number" placeholder="Amount">

</div>

<br>
<button class="save" onclick="save()">Save</button>
<button class="update" onclick="update()">Update</button>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Days</th>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health</th>
<th>Other</th>
<th>Gross</th>
<th>Net</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("payroll")) || [];
let editIndex = null;

/* SAVE */
function save(){

let name = name.value;
if(name==="") return alert("Enter name");

let rate = +rate.value || 0;
let days = +days.value || 0;

let paidSick = +paidSick.value || 0;
let unpaidSick = +unpaidSick.value || 0;

let paidVacation = +paidVacation.value || 0;
let unpaidVacation = +unpaidVacation.value || 0;

let paidBirthday = +paidBirthday.value || 0;
let unpaidBirthday = +unpaidBirthday.value || 0;

let ot = +ot.value || 0;
let holiday = +holiday.value || 0;

let sss = +sss.value || 0;
let pagibig = +pagibig.value || 0;
let philhealth = +philhealth.value || 0;
let healthcard = +healthcard.value || 0;
let other = +other.value || 0;

/* COMPUTE */
let gross = rate * (days + paidSick + paidVacation + paidBirthday + ot + holiday);

let unpaid = rate * (unpaidSick + unpaidVacation + unpaidBirthday);

let totalDed = sss + pagibig + philhealth + healthcard + other + unpaid;

let net = gross - totalDed;

let rec = {
name, rate, days,
sss, pagibig, philhealth, healthcard, other,
gross, net
};

data.push(rec);
localStorage.setItem("payroll", JSON.stringify(data));

display();
clearForm();
}

/* DISPLAY */
function display(){
tbl.innerHTML="";
data.forEach((p,i)=>{
tbl.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.rate}</td>
<td>${p.days}</td>
<td>${p.sss}</td>
<td>${p.pagibig}</td>
<td>${p.philhealth}</td>
<td>${p.healthcard}</td>
<td>${p.other}</td>
<td>${p.gross}</td>
<td style="color:green;font-weight:bold">${p.net}</td>
<td>
<button onclick="edit(${i})">Edit</button>
<button class="delete" onclick="del(${i})">Delete</button>
</td>
</tr>`;
});
}

/* EDIT */
function edit(i){
let p=data[i];
editIndex=i;

name.value=p.name;
rate.value=p.rate;
days.value=p.days;

sss.value=p.sss;
pagibig.value=p.pagibig;
philhealth.value=p.philhealth;
healthcard.value=p.healthcard;
other.value=p.other;
}

/* UPDATE */
function update(){
if(editIndex===null) return alert("Select first");
data.splice(editIndex,1);
editIndex=null;
save();
}

/* DELETE */
function del(i){
if(confirm("Delete?")){
data.splice(i,1);
localStorage.setItem("payroll", JSON.stringify(data));
display();
}
}

/* CLEAR */
function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

/* BACK */
function goBack(){
window.location.href="index.html";
}

display();

</script>

</body>
</html>
