<!DOCTYPE html>
<html>
<head>
<title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background:#eef2f7;
  padding:20px;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h2 { margin:0; }

.back {
  background:#6c757d;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

/* CARD */
.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-top:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* SECTION TITLE */
.section {
  margin-top:10px;
  font-weight:bold;
  color:#0d6efd;
}

/* GRID */
.form {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
  margin-top:10px;
}

input {
  padding:8px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* BUTTON */
.btn {
  padding:8px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  color:white;
  margin-top:10px;
}

.save { background:#198754; }
.update { background:#ffc107; color:black; }
.clear { background:#6c757d; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th {
  background:#0d6efd;
  color:white;
}
</style>

</head>

<body>

<div class="header">
  <h2>Payroll System (Full Version)</h2>
  <button class="back" onclick="goBack()">⬅ Back</button>
</div>

<div class="card">

<div class="section">Employee Info</div>
<div class="form">
  <input id="name" placeholder="Employee Name">
  <input id="rate" type="number" placeholder="Rate per Day">
  <input id="days" type="number" placeholder="Total Days">
</div>

<div class="section">Sick Leave</div>
<div class="form">
  <input id="paidSick" type="number" placeholder="Paid Sick">
  <input id="unpaidSick" type="number" placeholder="Unpaid Sick">
</div>

<div class="section">Vacation Leave</div>
<div class="form">
  <input id="paidVacation" type="number" placeholder="Paid Vacation">
  <input id="unpaidVacation" type="number" placeholder="Unpaid Vacation">
</div>

<div class="section">Birthday Leave</div>
<div class="form">
  <input id="paidBirthday" type="number" placeholder="Paid Birthday">
  <input id="unpaidBirthday" type="number" placeholder="Unpaid Birthday">
</div>

<div class="section">Other Earnings</div>
<div class="form">
  <input id="ot" type="number" placeholder="Overtime">
  <input id="holiday" type="number" placeholder="Holiday">
</div>

<div class="section">Deductions</div>
<div class="form">
  <input id="sss" type="number" placeholder="SSS">
  <input id="pagibig" type="number" placeholder="Pag-IBIG">
  <input id="philhealth" type="number" placeholder="PhilHealth">
  <input id="healthcard" type="number" placeholder="Health Card">
  <input id="othername" placeholder="Other Name">
  <input id="other" type="number" placeholder="Other Amount">
</div>

<button class="btn save" onclick="savePayroll()">Save</button>
<button class="btn update" onclick="updatePayroll()">Update</button>
<button class="btn clear" onclick="clearForm()">Clear</button>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>Name</th>
<th>Gross</th>
<th>Net</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>

let payroll = JSON.parse(localStorage.getItem("payroll")) || [];
let editIndex = null;

function savePayroll(){

  let name = document.getElementById("name").value.trim();
  if(!name) return alert("Enter name");

  let rate = +document.getElementById("rate").value || 0;
  let days = +document.getElementById("days").value || 0;

  let paidSick = +paidSick.value || 0;
  let unpaidSick = +unpaidSick.value || 0;

  let paidVacation = +paidVacation.value || 0;
  let unpaidVacation = +unpaidVacation.value || 0;

  let paidBirthday = +paidBirthday.value || 0;
  let unpaidBirthday = +unpaidBirthday.value || 0;

  let ot = +ot.value || 0;
  let holiday = +holiday.value || 0;

  let sss = +sss.value || 0;
  let pagibig = +pagibig.value || 0;
  let philhealth = +philhealth.value || 0;
  let healthcard = +healthcard.value || 0;
  let other = +other.value || 0;

  let gross = rate * (
    days + paidSick + paidVacation + paidBirthday + ot + holiday
  );

  let unpaidDeduction = rate * (
    unpaidSick + unpaidVacation + unpaidBirthday
  );

  let totalDed = sss + pagibig + philhealth + healthcard + other + unpaidDeduction;
  let net = gross - totalDed;

  let record = {
    name, rate, days,
    paidSick, unpaidSick,
    paidVacation, unpaidVacation,
    paidBirthday, unpaidBirthday,
    ot, holiday,
    sss, pagibig, philhealth, healthcard,
    othername: othername.value,
    other,
    gross: gross.toFixed(2),
    totalDed: totalDed.toFixed(2),
    net: net.toFixed(2),
    date: new Date().toLocaleString()
  };

  payroll.push(record);
  localStorage.setItem("payroll", JSON.stringify(payroll));

  clearForm();
  display();
}

function updatePayroll(){
  if(editIndex===null) return alert("Select record first");
  payroll.splice(editIndex,1);
  editIndex=null;
  savePayroll();
}

function display(){
  table.innerHTML="";
  payroll.forEach((p,i)=>{
    table.innerHTML+=`
    <tr>
      <td>${p.name}</td>
      <td>${p.gross}</td>
      <td>${p.net}</td>
      <td>
        <button onclick="edit(${i})">Edit</button>
        <button onclick="del(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

function edit(i){
  let p=payroll[i];
  editIndex=i;

  name.value=p.name;
  rate.value=p.rate;
  days.value=p.days;

  paidSick.value=p.paidSick;
  unpaidSick.value=p.unpaidSick;

  paidVacation.value=p.paidVacation;
  unpaidVacation.value=p.unpaidVacation;

  paidBirthday.value=p.paidBirthday;
  unpaidBirthday.value=p.unpaidBirthday;

  ot.value=p.ot;
  holiday.value=p.holiday;

  sss.value=p.sss;
  pagibig.value=p.pagibig;
  philhealth.value=p.philhealth;
  healthcard.value=p.healthcard;

  othername.value=p.othername;
  other.value=p.other;
}

function del(i){
  if(confirm("Delete?")){
    payroll.splice(i,1);
    localStorage.setItem("payroll", JSON.stringify(payroll));
    display();
  }
}

function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

function goBack(){
  window.location.href="index.html";
}

display();

</script>

</body>
</html>
