<!DOCTYPE html>
<html>
<head>
  <title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1f4037, #99f2c8);
  padding: 20px;
  color: white;
}

h2 { text-align:center; }

.top-bar { margin-bottom:10px; }

.back-btn {
  background:#34495e;
  color:white;
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* FORM */
.form {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap:10px;
}

input, select {
  padding:10px;
  border:none;
  border-radius:6px;
}

/* BUTTON */
button {
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.save { background:#2ecc71; }
.update { background:#f39c12; }
.cancel { background:#7f8c8d; }
.delete { background:#e74c3c; }

/* TABLE */
.table-box {
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  overflow-x:auto;
}

table {
  border-collapse: collapse;
  min-width:1300px;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:11px;
}

th {
  background:#2ecc71;
  color:white;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href="login.html";
}
</script>

</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<h2>PAYROLL SYSTEM (MANUAL)</h2>

<div class="card">
  <div class="form">

    <select id="employee"></select>

    <input type="number" id="rate" placeholder="Rate per Day">
    <input type="number" id="days" placeholder="Total Days">

    <input type="number" id="sss" placeholder="SSS">
    <input type="number" id="pagibig" placeholder="Pag-IBIG">
    <input type="number" id="philhealth" placeholder="PhilHealth">
    <input type="number" id="healthcard" placeholder="Health Card">

    <input type="number" id="other" placeholder="Other Deduction">
    <input type="text" id="othername" placeholder="Other Deduction Name">

    <button class="save" onclick="savePayroll()">Save</button>
    <button class="update" onclick="updatePayroll()" id="updateBtn" style="display:none;">Update</button>
    <button class="cancel" onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancel</button>

  </div>
</div>

<div class="table-box">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Rate</th>
        <th>Days</th>
        <th>Gross</th>
        <th>SSS</th>
        <th>Pag-IBIG</th>
        <th>PhilHealth</th>
        <th>Health Card</th>
        <th>Other</th>
        <th>Total Deduction</th>
        <th>Net Pay</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let payroll = JSON.parse(localStorage.getItem("payroll")) || [];

let editIndex = -1;

/* BACK */
function goBack(){
  window.location.href="index.html";
}

/* LOAD */
function loadEmployees(){
  employee.innerHTML = "<option value=''>Select Employee</option>";

  employees.forEach((e,i)=>{
    employee.innerHTML += `<option value="${i}">${e.fname} ${e.lname}</option>`;
  });
}

/* COMPUTE */
function compute(){
  let r = parseFloat(rate.value || 0);
  let d = parseFloat(days.value || 0);

  let s = parseFloat(sss.value || 0);
  let p = parseFloat(pagibig.value || 0);
  let ph = parseFloat(philhealth.value || 0);
  let hc = parseFloat(healthcard.value || 0);
  let o = parseFloat(other.value || 0);

  let gross = r * d;
  let totalDed = s + p + ph + hc + o;
  let net = gross - totalDed;

  return {gross, totalDed, net};
}

/* SAVE */
function savePayroll(){
  let i = employee.value;
  if(i==="") return alert("Select employee");

  let name = employees[i].fname + " " + employees[i].lname;

  let c = compute();

  payroll.push({
    name,
    rate: rate.value,
    days: days.value,
    sss: sss.value,
    pagibig: pagibig.value,
    philhealth: philhealth.value,
    healthcard: healthcard.value,
    other: other.value,
    othername: othername.value,
    gross: c.gross.toFixed(2),
    totalDed: c.totalDed.toFixed(2),
    net: c.net.toFixed(2)
  });

  save(); display(); clearForm();
}

/* EDIT */
function editPayroll(i){
  let p = payroll[i];

  rate.value = p.rate;
  days.value = p.days;
  sss.value = p.sss;
  pagibig.value = p.pagibig;
  philhealth.value = p.philhealth;
  healthcard.value = p.healthcard;
  other.value = p.other;
  othername.value = p.othername;

  editIndex = i;

  updateBtn.style.display="inline-block";
  cancelBtn.style.display="inline-block";
}

/* UPDATE */
function updatePayroll(){
  if(editIndex === -1) return;

  let p = payroll[editIndex];
  let c = compute();

  payroll[editIndex] = {
    ...p,
    rate: rate.value,
    days: days.value,
    sss: sss.value,
    pagibig: pagibig.value,
    philhealth: philhealth.value,
    healthcard: healthcard.value,
    other: other.value,
    othername: othername.value,
    gross: c.gross.toFixed(2),
    totalDed: c.totalDed.toFixed(2),
    net: c.net.toFixed(2)
  };

  save(); display(); cancelEdit();
}

/* DELETE */
function del(i){
  if(confirm("Delete?")){
    payroll.splice(i,1);
    save(); display();
  }
}

/* DISPLAY */
function display(){
  table.innerHTML="";

  payroll.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.rate}</td>
        <td>${p.days}</td>
        <td>${p.gross}</td>
        <td>${p.sss}</td>
        <td>${p.pagibig}</td>
        <td>${p.philhealth}</td>
        <td>${p.healthcard}</td>
        <td>${p.othername} (${p.other})</td>
        <td>${p.totalDed}</td>
        <td>${p.net}</td>
        <td>
          <button onclick="editPayroll(${i})">Edit</button>
          <button class="delete" onclick="del(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* HELPERS */
function save(){
  localStorage.setItem("payroll", JSON.stringify(payroll));
}

function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

/* INIT */
loadEmployees();
display();
</script>

</body>
</html>
