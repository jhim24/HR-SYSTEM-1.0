<!DOCTYPE html>
<html>
<head>
<title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#2c5364,#00c9ff);
  padding:20px;
  color:white;
}

/* HEADER */
.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back {
  background:#34495e;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

/* GRID */
.form {
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:15px; /* FIXED spacing */
}

/* INPUT */
input, select {
  background:#e0e0e0;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:13px;
  outline:none;
  width:100%;
}

/* BUTTON */
button {
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

.save { background:#2ecc71; color:white; }
.update { background:#f39c12; color:black; }
.delete { background:#e74c3c; color:white; }

/* TABLE */
.table-box {
  overflow-x:auto;
}

table {
  width:100%;
  min-width:1200px;
  border-collapse:collapse;
  background:white;
  color:black;
  margin-top:10px;
}

th, td {
  padding:10px;
  border:1px solid #ccc;
  text-align:center;
}

th {
  background:#2ecc71;
  color:white;
}
</style>

</head>

<body>

<div class="top">
  <h2>Payroll System</h2>
  <button class="back" onclick="goBack()">⬅ Back</button>
</div>

<div class="card">

<div class="form">

<input id="name" placeholder="Employee Name">
<input id="rate" type="number" placeholder="Rate">
<input id="days" type="number" placeholder="Days">

<select id="bank">
<option>Select Bank</option>
<option>BPI</option>
<option>BDO</option>
<option>Metrobank</option>
<option>Landbank</option>
</select>

<input id="paidSick" type="number" placeholder="Paid Sick">
<input id="unpaidSick" type="number" placeholder="Unpaid Sick">

<input id="paidVacation" type="number" placeholder="Paid Vacation">
<input id="unpaidVacation" type="number" placeholder="Unpaid Vacation">

<input id="paidBirthday" type="number" placeholder="Paid Birthday">
<input id="unpaidBirthday" type="number" placeholder="Unpaid Birthday">

<input id="ot" type="number" placeholder="OT">
<input id="holiday" type="number" placeholder="Holiday">

<input id="sss" type="number" placeholder="SSS">
<input id="pagibig" type="number" placeholder="Pag-IBIG">
<input id="philhealth" type="number" placeholder="PhilHealth">
<input id="healthcard" type="number" placeholder="Health Card">

<input id="othername" placeholder="Other Deduction Name">
<input id="other" type="number" placeholder="Other Amount">

</div>

<button class="save" onclick="save()">Save</button>
<button class="update" onclick="update()">Update</button>

</div>

<div class="card table-box">

<table>
<thead>
<tr>
<th>Name</th>
<th>Bank</th>
<th>Rate</th>
<th>Days</th>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health</th>
<th>Other</th>
<th>Gross</th>
<th>Net</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("payroll")) || [];
let editIndex = null;

/* SAVE */
function save(){

let name = document.getElementById("name").value;
if(name==="") return alert("Enter name");

let rate = +rate.value || 0;
let days = +days.value || 0;
let bank = bank.value;

let paidSick = +paidSick.value || 0;
let unpaidSick = +unpaidSick.value || 0;

let paidVacation = +paidVacation.value || 0;
let unpaidVacation = +unpaidVacation.value || 0;

let paidBirthday = +paidBirthday.value || 0;
let unpaidBirthday = +unpaidBirthday.value || 0;

let ot = +ot.value || 0;
let holiday = +holiday.value || 0;

let sss = +sss.value || 0;
let pagibig = +pagibig.value || 0;
let philhealth = +philhealth.value || 0;
let healthcard = +healthcard.value || 0;
let other = +other.value || 0;

/* COMPUTE */
let gross = rate * (days + paidSick + paidVacation + paidBirthday + ot + holiday);

let unpaid = rate * (unpaidSick + unpaidVacation + unpaidBirthday);

let totalDed = sss + pagibig + philhealth + healthcard + other + unpaid;

let net = gross - totalDed;

let rec = {
name, bank, rate, days,
sss, pagibig, philhealth, healthcard, other,
gross: gross.toFixed(2),
net: net.toFixed(2)
};

data.push(rec);
localStorage.setItem("payroll", JSON.stringify(data));

display();
clearForm();
}

/* DISPLAY */
function display(){
tbl.innerHTML="";
data.forEach((p,i)=>{
tbl.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.bank}</td>
<td>${p.rate}</td>
<td>${p.days}</td>
<td>${p.sss}</td>
<td>${p.pagibig}</td>
<td>${p.philhealth}</td>
<td>${p.healthcard}</td>
<td>${p.other}</td>
<td>${p.gross}</td>
<td style="color:green;font-weight:bold">${p.net}</td>
<td>
<button onclick="edit(${i})">Edit</button>
<button class="delete" onclick="del(${i})">Delete</button>
</td>
</tr>`;
});
}

/* EDIT */
function edit(i){
let p=data[i];
editIndex=i;

name.value=p.name;
rate.value=p.rate;
days.value=p.days;
bank.value=p.bank;

sss.value=p.sss;
pagibig.value=p.pagibig;
philhealth.value=p.philhealth;
healthcard.value=p.healthcard;
other.value=p.other;
}

/* UPDATE */
function update(){
if(editIndex===null) return alert("Select first");
data.splice(editIndex,1);
editIndex=null;
save();
}

/* DELETE */
function del(i){
if(confirm("Delete?")){
data.splice(i,1);
localStorage.setItem("payroll", JSON.stringify(data));
display();
}
}

/* CLEAR */
function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

/* BACK */
function goBack(){
window.location.href="index.html";
}

display();

</script>

</body>
</html>
