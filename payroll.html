<!DOCTYPE html>
<html>
<head>
<title>Payroll</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

.wrapper{display:flex;height:100vh;}

.sidebar{
  width:240px;
  background:rgba(0,0,0,0.6);
  padding:20px;
}

.menu li{
  padding:10px;
  cursor:pointer;
  list-style:none;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.table-box{
  background:#eaf4ff;
  padding:10px;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  color:#2c3e50;
  font-size:12px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
}

th{background:#3c89b8;color:white;}

.btn{
  padding:5px;
  border:none;
  cursor:pointer;
  border-radius:4px;
}

.compute{background:#2ecc71;color:white;}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
<h3>HR System</h3>
<ul class="menu">
<li onclick="goPage('employee.html')">Employees</li>
<li onclick="goPage('attendance.html')">Attendance</li>
<li onclick="goPage('payroll.html')">Payroll</li>
</ul>
</div>

<div class="main">

<h2>Payroll</h2>

<button class="btn compute" onclick="computePayroll()">Compute Payroll</button>

<div class="table-box">
<table id="tbl">
<thead>
<tr>
<th>Name</th>
<th>Days</th>
<th>Late</th>
<th>OT</th>
<th>Basic</th>
<th>Deduction</th>
<th>Net</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>
</div>

<script>
let emp = JSON.parse(localStorage.getItem("employees")) || [];
let att = JSON.parse(localStorage.getItem("attendance")) || [];

function computePayroll(){
  let tbody = document.querySelector("#tbl tbody");
  tbody.innerHTML = "";

  emp.forEach(e=>{
    let records = att.filter(a=>a.name.includes(e.fname));

    let days = records.length;
    let late = records.reduce((sum,r)=>sum+Number(r.late),0);
    let ot = records.reduce((sum,r)=>sum+Number(r.ot),0);

    let basic = days * 500; // sample rate
    let deduction = late * 2;
    let net = basic - deduction + (ot*50);

    tbody.innerHTML += `
    <tr>
      <td>${e.fname}</td>
      <td>${days}</td>
      <td>${late}</td>
      <td>${ot}</td>
      <td>${basic}</td>
      <td>${deduction}</td>
      <td>${net}</td>
    </tr>`;
  });
}

function goPage(p){window.location.href=p;}
</script>

</body>
</html>
