<!DOCTYPE html>
<html>
<head>
<title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#2c5364,#00c9ff);
  padding:20px;
  color:white;
}

/* HEADER */
.top {
  display:flex;
  justify-content:space-between;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

/* GRID (FIXED ALIGNMENT) */
.form {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:12px;
}

/* INPUT SAME SIZE */
input, select {
  background:#e0e0e0;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:13px;
  width:100%;
  height:40px;
}

/* BUTTON */
button {
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

.save { background:#2ecc71; color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  background:white;
  color:black;
  margin-top:10px;
}

th, td {
  padding:10px;
  border:1px solid #ccc;
  text-align:center;
}

th {
  background:#2ecc71;
  color:white;
}
</style>

</head>

<body>

<div class="top">
<h2>Payroll System</h2>
<button onclick="goBack()">⬅ Back</button>
</div>

<div class="card">

<div class="form">

<select id="emp">
<option>Select Employee</option>
</select>

<input id="rate" type="number" placeholder="Rate per Day">
<input id="days" type="number" placeholder="Total Days">
<input id="holiday" type="number" placeholder="Holidays">

<input id="ot" type="number" placeholder="Overtime">
<input id="sick" type="number" placeholder="Sick Leave">
<input id="vacation" type="number" placeholder="Vacation Leave">
<input id="birthday" type="number" placeholder="Birthday Leave">

<input id="sss" type="number" placeholder="SSS">
<input id="pagibig" type="number" placeholder="Pag-IBIG">
<input id="philhealth" type="number" placeholder="PhilHealth">
<input id="healthcard" type="number" placeholder="Health Card">

<input id="other" type="number" placeholder="Other Deduction">
<input id="loan" type="number" placeholder="Loan">

</div>

<button class="save" onclick="save()">Generate Payroll</button>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Days</th>
<th>Gross</th>
<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Loan</th>
<th>Net</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

let employees = JSON.parse(localStorage.getItem("employees")) || [];
let history = JSON.parse(localStorage.getItem("payrollHistory")) || [];

function loadEmployees(){
emp.innerHTML="<option>Select Employee</option>";
employees.forEach((e,i)=>{
emp.innerHTML += `<option value="${i}">${e.firstname} ${e.lastname}</option>`;
});
}

function save(){

let i = emp.value;
if(i==="Select Employee") return alert("Select employee");

let e = employees[i];

let rate = +rate.value || 0;
let days = +days.value || 0;
let holiday = +holiday.value || 0;
let ot = +ot.value || 0;
let sick = +sick.value || 0;
let vacation = +vacation.value || 0;
let birthday = +birthday.value || 0;

let sss = +sss.value || 0;
let pagibig = +pagibig.value || 0;
let philhealth = +philhealth.value || 0;
let healthcard = +healthcard.value || 0;
let other = +other.value || 0;
let loan = +loan.value || 0;

let gross = rate * (days + holiday + ot + sick + vacation + birthday);
let totalDed = sss + pagibig + philhealth + healthcard + other + loan;
let net = gross - totalDed;

history.push({
name: e.firstname + " " + e.lastname,
rate, days, gross,
sss, pagibig, philhealth, loan,
net
});

localStorage.setItem("payrollHistory", JSON.stringify(history));
display();
}

function display(){
tbl.innerHTML="";
history.forEach(p=>{
tbl.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.rate}</td>
<td>${p.days}</td>
<td>${p.gross}</td>
<td>${p.sss}</td>
<td>${p.pagibig}</td>
<td>${p.philhealth}</td>
<td>${p.loan}</td>
<td style="color:green;font-weight:bold">${p.net}</td>
</tr>`;
});
}

function goBack(){
window.location.href="index.html";
}

loadEmployees();
display();

</script>

</body>
</html>
