<!DOCTYPE html>
<html>
<head>
<title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background:#eef3ff;
  padding:20px;
}

/* BOX */
.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* GRID */
.form {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

/* INPUT */
input, select {
  padding:6px;
  font-size:12px;
  border:1px solid #ccc;
  border-radius:5px;
}

/* BUTTON */
button {
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.save { background:green; color:white; }
.delete { background:red; color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:12px;
}

th {
  background:#2ecc71;
  color:white;
}
</style>
</head>

<body>

<h2>Payroll System</h2>

<div class="box">

<div class="form">

<select id="emp"></select>

<input id="rate" placeholder="Rate per Day">
<input id="days" placeholder="Days">
<input id="holiday" placeholder="Holidays">

<input id="ot" placeholder="Overtime">
<input id="sick" placeholder="Sick Leave">
<input id="vacation" placeholder="Vacation Leave">

<input id="sss" placeholder="SSS">
<input id="pagibig" placeholder="Pag-IBIG">
<input id="philhealth" placeholder="PhilHealth">

<input id="healthcard" placeholder="Health Card">
<input id="other" placeholder="Other Deduction">

</div>

<br>
<button class="save" onclick="save()">Generate Payroll</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>Full Name</th>
<th>Rate</th>
<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Vacation</th>
<th>Total Gross</th>

<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health Card</th>
<th>Other</th>

<th>Total Deduction</th>
<th>Net Pay</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

let employees = JSON.parse(localStorage.getItem("employees")) || [];
let history = JSON.parse(localStorage.getItem("payrollHistory")) || [];

/* LOAD EMP */
function loadEmployees(){
emp.innerHTML="<option>Select Employee</option>";
employees.forEach((e,i)=>{
emp.innerHTML += `<option value="${i}">${e.firstname} ${e.lastname}</option>`;
});
}

/* SAVE */
function save(){

let i = emp.value;
if(i==="Select Employee") return alert("Select employee");

let e = employees[i];

let rate = +rate.value || 0;
let days = +days.value || 0;
let holiday = +holiday.value || 0;
let ot = +ot.value || 0;
let sick = +sick.value || 0;
let vacation = +vacation.value || 0;

let sss = +sss.value || 0;
let pagibig = +pagibig.value || 0;
let philhealth = +philhealth.value || 0;
let healthcard = +healthcard.value || 0;
let other = +other.value || 0;

/* COMPUTE */
let totalDays = days + holiday + ot + sick + vacation;
let gross = rate * totalDays;

let totalDed = sss + pagibig + philhealth + healthcard + other;

let net = gross - totalDed;

/* SAVE */
history.push({
name: e.firstname + " " + e.lastname,
rate,
ot,
holiday,
sick,
vacation,
gross,
sss,
pagibig,
philhealth,
healthcard,
other,
totalDed,
net
});

localStorage.setItem("payrollHistory", JSON.stringify(history));

display();
}

/* DISPLAY */
function display(){
tbl.innerHTML="";
history.forEach((p,i)=>{
tbl.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.rate}</td>
<td>${p.ot}</td>
<td>${p.holiday}</td>
<td>${p.sick}</td>
<td>${p.vacation}</td>
<td>${p.gross}</td>

<td>${p.sss}</td>
<td>${p.pagibig}</td>
<td>${p.philhealth}</td>
<td>${p.healthcard}</td>
<td>${p.other}</td>

<td>${p.totalDed}</td>
<td style="color:green;font-weight:bold">${p.net}</td>

<td><button class="delete" onclick="del(${i})">Delete</button></td>
</tr>`;
});
}

/* DELETE */
function del(i){
history.splice(i,1);
localStorage.setItem("payrollHistory", JSON.stringify(history));
display();
}

loadEmployees();
display();

</script>

</body>
</html>
