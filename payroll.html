<!DOCTYPE html>
<html>
<head>
<title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background:#eef3ff;
  padding:20px;
}

h2 {
  border-bottom:3px solid green;
}

/* BOX */
.box {
  border:2px solid green;
  padding:15px;
  border-radius:10px;
  background:white;
  margin-bottom:10px;
}

/* INPUT */
input {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

/* BUTTON */
button {
  padding:8px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.save { background:green; color:white; }
.update { background:orange; }
.delete { background:red; color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th {
  background:green;
  color:white;
}
</style>

</head>

<body>

<h2>Payroll System</h2>

<div class="box">

<input id="name" placeholder="Employee Name">

<input id="rate" type="number" placeholder="Rate per Day">
<input id="days" type="number" placeholder="Days">

<!-- SICK -->
<input id="paidSick" type="number" placeholder="Paid Sick">
<input id="unpaidSick" type="number" placeholder="Unpaid Sick">

<!-- VACATION -->
<input id="paidVacation" type="number" placeholder="Paid Vacation">
<input id="unpaidVacation" type="number" placeholder="Unpaid Vacation">

<!-- BIRTHDAY -->
<input id="paidBirthday" type="number" placeholder="Paid Birthday">
<input id="unpaidBirthday" type="number" placeholder="Unpaid Birthday">

<!-- OTHER -->
<input id="ot" type="number" placeholder="OT">
<input id="holiday" type="number" placeholder="Holiday">

<input id="sss" type="number" placeholder="SSS">
<input id="pagibig" type="number" placeholder="Pag-IBIG">
<input id="philhealth" type="number" placeholder="PhilHealth">
<input id="healthcard" type="number" placeholder="Health Card">

<input id="othername" placeholder="Other Deduction Name">
<input id="other" type="number" placeholder="Other Amount">

<br>

<button class="save" onclick="save()">Save</button>
<button class="update" onclick="update()">Update</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>Name</th>
<th>Gross</th>
<th>Total Deduction</th>
<th>Net</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("payroll")) || [];
let editIndex = null;

/* SAVE */
function save(){

let name = document.getElementById("name").value.trim();
if(name==="") return alert("Enter employee name");

let rate = +document.getElementById("rate").value || 0;
let days = +document.getElementById("days").value || 0;

/* SICK */
let paidSick = +document.getElementById("paidSick").value || 0;
let unpaidSick = +document.getElementById("unpaidSick").value || 0;

/* VACATION */
let paidVacation = +document.getElementById("paidVacation").value || 0;
let unpaidVacation = +document.getElementById("unpaidVacation").value || 0;

/* BIRTHDAY */
let paidBirthday = +document.getElementById("paidBirthday").value || 0;
let unpaidBirthday = +document.getElementById("unpaidBirthday").value || 0;

/* OTHER */
let ot = +document.getElementById("ot").value || 0;
let holiday = +document.getElementById("holiday").value || 0;

let sss = +document.getElementById("sss").value || 0;
let pagibig = +document.getElementById("pagibig").value || 0;
let philhealth = +document.getElementById("philhealth").value || 0;
let healthcard = +document.getElementById("healthcard").value || 0;
let other = +document.getElementById("other").value || 0;

/* GROSS */
let gross = rate * (
  days +
  paidSick +
  paidVacation +
  paidBirthday +
  ot +
  holiday
);

/* UNPAID DEDUCTION */
let unpaid = rate * (
  unpaidSick +
  unpaidVacation +
  unpaidBirthday
);

/* TOTAL DEDUCTION */
let totalDed = sss + pagibig + philhealth + healthcard + other + unpaid;

/* NET */
let net = gross - totalDed;

let rec = {
name,
rate, days,
paidSick, unpaidSick,
paidVacation, unpaidVacation,
paidBirthday, unpaidBirthday,
ot, holiday,
sss, pagibig, philhealth, healthcard,
othername: document.getElementById("othername").value,
other,
gross: gross.toFixed(2),
totalDed: totalDed.toFixed(2),
net: net.toFixed(2),
date: new Date().toLocaleString()
};

data.push(rec);
localStorage.setItem("payroll", JSON.stringify(data));

display();
clearForm();
}

/* DISPLAY */
function display(){
tbl.innerHTML="";
data.forEach((p,i)=>{
tbl.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.gross}</td>
<td>${p.totalDed}</td>
<td>${p.net}</td>
<td>
<button onclick="edit(${i})">Edit</button>
<button class="delete" onclick="del(${i})">Delete</button>
</td>
</tr>`;
});
}

/* EDIT */
function edit(i){
let p=data[i];
editIndex=i;

name.value=p.name;
rate.value=p.rate;
days.value=p.days;

paidSick.value=p.paidSick;
unpaidSick.value=p.unpaidSick;

paidVacation.value=p.paidVacation;
unpaidVacation.value=p.unpaidVacation;

paidBirthday.value=p.paidBirthday;
unpaidBirthday.value=p.unpaidBirthday;

ot.value=p.ot;
holiday.value=p.holiday;

sss.value=p.sss;
pagibig.value=p.pagibig;
philhealth.value=p.philhealth;
healthcard.value=p.healthcard;

othername.value=p.othername;
other.value=p.other;
}

/* UPDATE */
function update(){
if(editIndex===null) return alert("Select record first");

data.splice(editIndex,1);
editIndex=null;
save();
}

/* DELETE */
function del(i){
if(confirm("Delete record?")){
data.splice(i,1);
localStorage.setItem("payroll", JSON.stringify(data));
display();
}
}

/* CLEAR */
function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

/* INIT */
display();

</script>

</body>
</html>
