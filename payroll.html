<!DOCTYPE html>
<html>
<head>
<title>Payroll System</title>

<style>
body {
  font-family: Arial;
  background:#eef3ff;
  padding:20px;
}

/* HEADER */
.top {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

/* BUTTON */
button {
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.back { background:#34495e; color:white; }
.save { background:green; color:white; }
.update { background:orange; color:white; }
.delete { background:red; color:white; }

/* BOX */
.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* GRID */
.form {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

/* INPUT */
input, select {
  padding:6px;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:12px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:12px;
}

th {
  background:#2ecc71;
  color:white;
}
</style>
</head>

<body>

<div class="top">
<h2>Payroll System</h2>
<button class="back" onclick="goBack()">⬅ Back</button>
</div>

<div class="box">

<div class="form">

<select id="emp">
<option value="">Select Employee</option>
</select>

<input id="rate" placeholder="Rate per Day">
<input id="days" placeholder="Days">
<input id="holiday" placeholder="Holidays">

<input id="ot" placeholder="Overtime">
<input id="sick" placeholder="Sick Leave">
<input id="vacation" placeholder="Vacation Leave">

<input id="sss" placeholder="SSS">
<input id="pagibig" placeholder="Pag-IBIG">
<input id="philhealth" placeholder="PhilHealth">

<input id="healthcard" placeholder="Health Card">
<input id="other" placeholder="Other Deduction">

</div>

<br>
<button class="save" onclick="compute()">Compute Salary</button>
<button class="update" onclick="update()">Update</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>Full Name</th>
<th>Rate</th>
<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Vacation</th>
<th>Total Gross</th>

<th>SSS</th>
<th>Pag-IBIG</th>
<th>PhilHealth</th>
<th>Health Card</th>
<th>Other</th>

<th>Total Deduction</th>
<th>Net Pay</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

let employees = JSON.parse(localStorage.getItem("employees")) || [];
let history = JSON.parse(localStorage.getItem("payrollHistory")) || [];
let editIndex = -1;

/* LOAD EMPLOYEES */
function loadEmployees(){
let select = document.getElementById("emp");
select.innerHTML = '<option value="">Select Employee</option>';

employees.forEach((e,i)=>{
  select.innerHTML += `<option value="${i}">
    ${e.fname} ${e.lname}
  </option>`;
});
}

/* COMPUTE */
function compute(){

let i = document.getElementById("emp").value;

if(i === ""){
  alert("Select employee");
  return;
}

let e = employees[i];

let rate = +document.getElementById("rate").value || 0;
let days = +document.getElementById("days").value || 0;
let holiday = +document.getElementById("holiday").value || 0;
let ot = +document.getElementById("ot").value || 0;
let sick = +document.getElementById("sick").value || 0;
let vacation = +document.getElementById("vacation").value || 0;

let sss = +document.getElementById("sss").value || 0;
let pagibig = +document.getElementById("pagibig").value || 0;
let philhealth = +document.getElementById("philhealth").value || 0;
let healthcard = +document.getElementById("healthcard").value || 0;
let other = +document.getElementById("other").value || 0;

/* COMPUTE */
let totalDays = days + holiday + ot + sick + vacation;
let gross = rate * totalDays;

let totalDed = sss + pagibig + philhealth + healthcard + other;
let net = gross - totalDed;

let record = {
name: e.fname + " " + e.lname,
rate, ot, holiday, sick, vacation,
gross,
sss, pagibig, philhealth, healthcard, other,
totalDed,
net
};

/* SAVE OR UPDATE */
if(editIndex === -1){
  history.push(record);
}else{
  history[editIndex] = record;
  editIndex = -1;
}

localStorage.setItem("payrollHistory", JSON.stringify(history));

display();
clearForm();
}

/* EDIT */
function edit(i){
let p = history[i];
editIndex = i;

document.getElementById("rate").value = p.rate;
document.getElementById("ot").value = p.ot;
document.getElementById("holiday").value = p.holiday;
document.getElementById("sick").value = p.sick;
document.getElementById("vacation").value = p.vacation;

document.getElementById("sss").value = p.sss;
document.getElementById("pagibig").value = p.pagibig;
document.getElementById("philhealth").value = p.philhealth;
document.getElementById("healthcard").value = p.healthcard;
document.getElementById("other").value = p.other;
}

/* UPDATE BUTTON */
function update(){
if(editIndex === -1){
  alert("Click Edit first");
  return;
}
compute();
}

/* DELETE */
function del(i){
if(confirm("Delete?")){
  history.splice(i,1);
  localStorage.setItem("payrollHistory", JSON.stringify(history));
  display();
}
}

/* DISPLAY */
function display(){
let tbl = document.getElementById("tbl");
tbl.innerHTML = "";

history.forEach((p,i)=>{
tbl.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.rate}</td>
<td>${p.ot}</td>
<td>${p.holiday}</td>
<td>${p.sick}</td>
<td>${p.vacation}</td>
<td>${p.gross}</td>

<td>${p.sss}</td>
<td>${p.pagibig}</td>
<td>${p.philhealth}</td>
<td>${p.healthcard}</td>
<td>${p.other}</td>

<td>${p.totalDed}</td>
<td style="color:green;font-weight:bold">${p.net}</td>

<td>
<button onclick="edit(${i})">Edit</button>
<button class="delete" onclick="del(${i})">Delete</button>
</td>
</tr>`;
});
}

/* CLEAR */
function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

/* BACK */
function goBack(){
window.location.href="index.html";
}

/* INIT */
loadEmployees();
display();

</script>

</body>
</html>
