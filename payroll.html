<!DOCTYPE html>
<html>
<head>
<title>Payroll System Pro</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#dfe9f3,#ffffff);
  padding:20px;
}

/* HEADER */
h2 {
  text-align:center;
  color:#2c3e50;
}

/* CARD */
.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* GRID */
.form {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

/* LABEL */
.label {
  grid-column: span 3;
  font-weight:bold;
  color:#34495e;
  margin-top:5px;
}

/* INPUT */
input {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:13px;
  width:100%;
}

/* BUTTON */
.buttons {
  margin-top:10px;
}

button {
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
  font-size:13px;
}

.save { background:#27ae60; color:white; }
.update { background:#f39c12; }
.delete { background:#e74c3c; color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
  font-size:13px;
}

th {
  background:#3498db;
  color:white;
}

tr:hover {
  background:#f2f2f2;
}
</style>

</head>

<body>

<h2>Payroll System</h2>

<div class="card">

<div class="form">

<div class="label">Employee Info</div>
<input id="name" placeholder="Employee Name">
<input id="rate" type="number" placeholder="Rate / Day">
<input id="days" type="number" placeholder="Total Days">

<div class="label">Sick Leave</div>
<input id="paidSick" type="number" placeholder="Paid Sick">
<input id="unpaidSick" type="number" placeholder="Unpaid Sick">

<div class="label">Vacation Leave</div>
<input id="paidVacation" type="number" placeholder="Paid Vacation">
<input id="unpaidVacation" type="number" placeholder="Unpaid Vacation">

<div class="label">Birthday Leave</div>
<input id="paidBirthday" type="number" placeholder="Paid Birthday">
<input id="unpaidBirthday" type="number" placeholder="Unpaid Birthday">

<div class="label">Other Earnings</div>
<input id="ot" type="number" placeholder="Overtime">
<input id="holiday" type="number" placeholder="Holiday">

<div class="label">Deductions</div>
<input id="sss" type="number" placeholder="SSS">
<input id="pagibig" type="number" placeholder="Pag-IBIG">
<input id="philhealth" type="number" placeholder="PhilHealth">
<input id="healthcard" type="number" placeholder="Health Card">
<input id="othername" placeholder="Other Deduction Name">
<input id="other" type="number" placeholder="Other Amount">

</div>

<div class="buttons">
<button class="save" onclick="save()">Save</button>
<button class="update" onclick="update()">Update</button>
</div>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Days</th>
<th>Gross</th>
<th>Deduction</th>
<th>Net</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("payroll")) || [];
let editIndex = null;

/* SAVE */
function save(){

let name = nameInput();
if(name==="") return alert("Enter name");

let rate = +rateInput();
let days = +daysInput();

let paidSick = +paidSick.value || 0;
let unpaidSick = +unpaidSick.value || 0;

let paidVacation = +paidVacation.value || 0;
let unpaidVacation = +unpaidVacation.value || 0;

let paidBirthday = +paidBirthday.value || 0;
let unpaidBirthday = +unpaidBirthday.value || 0;

let ot = +ot.value || 0;
let holiday = +holiday.value || 0;

let sss = +sss.value || 0;
let pagibig = +pagibig.value || 0;
let philhealth = +philhealth.value || 0;
let healthcard = +healthcard.value || 0;
let other = +other.value || 0;

/* COMPUTE */
let gross = rate * (
days + paidSick + paidVacation + paidBirthday + ot + holiday
);

let unpaid = rate * (
unpaidSick + unpaidVacation + unpaidBirthday
);

let totalDed = sss + pagibig + philhealth + healthcard + other + unpaid;
let net = gross - totalDed;

let rec = {
name, rate, days,
paidSick, unpaidSick,
paidVacation, unpaidVacation,
paidBirthday, unpaidBirthday,
ot, holiday,
sss, pagibig, philhealth, healthcard,
othername: othername.value,
other,
gross, totalDed, net
};

data.push(rec);
localStorage.setItem("payroll", JSON.stringify(data));

display();
clearForm();
}

/* DISPLAY */
function display(){
tbl.innerHTML="";
data.forEach((p,i)=>{
tbl.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.rate}</td>
<td>${p.days}</td>
<td>${p.gross}</td>
<td>${p.totalDed}</td>
<td>${p.net}</td>
<td>
<button onclick="edit(${i})">Edit</button>
<button class="delete" onclick="del(${i})">Delete</button>
</td>
</tr>`;
});
}

/* EDIT */
function edit(i){
let p=data[i];
editIndex=i;

name.value=p.name;
rate.value=p.rate;
days.value=p.days;

paidSick.value=p.paidSick;
unpaidSick.value=p.unpaidSick;

paidVacation.value=p.paidVacation;
unpaidVacation.value=p.unpaidVacation;

paidBirthday.value=p.paidBirthday;
unpaidBirthday.value=p.unpaidBirthday;

ot.value=p.ot;
holiday.value=p.holiday;

sss.value=p.sss;
pagibig.value=p.pagibig;
philhealth.value=p.philhealth;
healthcard.value=p.healthcard;

othername.value=p.othername;
other.value=p.other;
}

/* UPDATE */
function update(){
if(editIndex===null) return alert("Select first");
data.splice(editIndex,1);
editIndex=null;
save();
}

/* DELETE */
function del(i){
if(confirm("Delete?")){
data.splice(i,1);
localStorage.setItem("payroll", JSON.stringify(data));
display();
}
}

/* CLEAR */
function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

/* HELPERS */
function nameInput(){ return document.getElementById("name").value; }
function rateInput(){ return document.getElementById("rate").value; }
function daysInput(){ return document.getElementById("days").value; }

/* INIT */
display();

</script>

</body>
</html>
