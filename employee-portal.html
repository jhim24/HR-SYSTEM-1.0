<!DOCTYPE html>
<html>
<head>
<title>HR Dashboard</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI';}

body{
  margin:0;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.wrapper{display:flex;height:100vh;}

.sidebar{
  width:240px;
  background:rgba(0,0,0,0.7);
  padding:20px;
}

.menu{list-style:none;padding:0;}
.menu li{padding:10px;cursor:pointer;border-radius:6px;}
.menu li:hover{background:rgba(255,255,255,0.2);}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* BOX */
.box{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

/* INPUT */
input{
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:6px;
  border:none;
}

button{
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
}
</style>

<script>
if(localStorage.getItem("loggedIn")!=="true"){
  window.location.href="login.html";
}
</script>

</head>

<body>

<div class="wrapper">

<div class="sidebar">
<h3>HR System</h3>
<ul class="menu">
<li onclick="goPage('employee.html')">Employee</li>
<li onclick="goPage('attendance.html')">Attendance</li>
<li onclick="goPage('payroll.html')">Payroll</li>
<li onclick="goPage('payslip.html')">Payslip</li>
<li onclick="goPage('admin-requests.html')">Requests</li>
</ul>
</div>

<div class="main">

<h2>Dashboard</h2>

<!-- 📢 ANNOUNCEMENT -->
<div class="box">
<h3>📢 Announcements</h3>

<input id="announceInput" placeholder="Enter announcement...">
<button onclick="addAnnouncement()">Post</button>

<div id="announceList"></div>
</div>

</div>

</div>

<script>

/* NAV */
function goPage(p){window.location.href=p;}

/* ANNOUNCEMENT */
let announcements = JSON.parse(localStorage.getItem("announcements")) || [];

function addAnnouncement(){
  if(!announceInput.value) return;

  announcements.push({
    text:announceInput.value,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("announcements",JSON.stringify(announcements));
  announceInput.value="";
  loadAnnouncements();
}

function loadAnnouncements(){
  let box=document.getElementById("announceList");
  box.innerHTML="";

  announcements.slice().reverse().forEach(a=>{
    box.innerHTML+=`
    <div style="margin-top:5px;padding:6px;background:rgba(255,255,255,0.1);border-radius:6px;">
      📢 ${a.text}<br>
      <small>${a.date}</small>
    </div>`;
  });
}

loadAnnouncements();

</script>

</body>
</html>
