<!DOCTYPE html>
<html>
<head>
<title>Employee Portal</title>

<style>
body{
  font-family:Arial;
  background:#f0f0f0;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
}

.box{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

.logout{
  float:right;
  background:red;
  color:white;
  padding:5px;
  cursor:pointer;
}

/* INPUT */
input,select,textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
}

/* BUTTON */
button{
  padding:8px;
  margin-top:8px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="box">
<div class="logout" onclick="logout()">Logout</div>
<h2>Employee Dashboard</h2>
<div id="userInfo"></div>
</div>

<!-- REQUEST FORM -->
<div class="box">
<h3>Request Form</h3>

<select id="type">
  <option value="Leave">Leave</option>
  <option value="Day Off">Day Off</option>
</select>

<input type="date" id="date">
<textarea id="reason" placeholder="Reason"></textarea>

<button onclick="submitRequest()">Submit</button>
</div>

<!-- HISTORY -->
<div class="box">
<h3>My Requests</h3>

<table>
<thead>
<tr>
<th>Type</th>
<th>Date</th>
<th>Reason</th>
<th>Status</th>
</tr>
</thead>
<tbody id="reqTable"></tbody>
</table>

</div>

</div>

<script>

/* SESSION */
let user = JSON.parse(localStorage.getItem("empSession"));

if(!user){
  window.location.href="login.html";
}

document.getElementById("userInfo").innerHTML =
  `<b>${user.fname} ${user.lname}</b> - ${user.position || ""}`;

/* STORAGE */
let requests = JSON.parse(localStorage.getItem("requests")) || [];

/* SUBMIT */
function submitRequest(){

  let r = {
    name: user.fname + " " + user.lname,
    type: type.value,
    date: date.value,
    reason: reason.value,
    status: "Pending"
  };

  requests.push(r);
  localStorage.setItem("requests", JSON.stringify(requests));

  loadRequests();
}

/* LOAD */
function loadRequests(){

  let tbody = document.getElementById("reqTable");
  tbody.innerHTML = "";

  requests
    .filter(r => r.name === (user.fname + " " + user.lname))
    .forEach(r => {

      tbody.innerHTML += `
      <tr>
        <td>${r.type}</td>
        <td>${r.date}</td>
        <td>${r.reason}</td>
        <td>${r.status}</td>
      </tr>`;
    });
}

function logout(){
  localStorage.removeItem("empSession");
  window.location.href="login.html";
}

loadRequests();

</script>

</body>
</html>
