<!DOCTYPE html>
<html>
<head>
<title>My Payslip</title>

<style>
body{
  font-family:Arial;
  background:#f0f0f0;
  padding:20px;
}

.box{
  max-width:600px;
  margin:auto;
  background:white;
  padding:20px;
}

.logout{
  background:red;
  color:white;
  padding:5px;
  cursor:pointer;
  float:right;
}
</style>
</head>

<body>

<div class="box">

<div class="logout" onclick="logout()">Logout</div>

<h2>My Payslip</h2>

<div id="info"></div>

</div>

<script>

let user = JSON.parse(localStorage.getItem("empSession"));

if(!user){
  window.location.href="employee-login.html";
}

let payroll = JSON.parse(localStorage.getItem("payroll"))||[];

let fullName = user.fname + " " + user.lname;

let p = payroll.find(x=>x.name === fullName);

if(p){
  document.getElementById("info").innerHTML = `
    <p><b>Name:</b> ${p.name}</p>
    <p><b>Gross:</b> ${p.gross}</p>
    <p><b>Net:</b> ${p.net}</p>
  `;
}else{
  document.getElementById("info").innerHTML = "No payslip available";
}

function logout(){
  localStorage.removeItem("empSession");
  window.location.href="employee-login.html";
}
</script>

</body>
</html>
