<!DOCTYPE html>
<html>
<head>
<title>Employee Portal</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI';}

body{
  margin:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
  color:white;
}

.container{max-width:900px;margin:auto;}

.box{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:20px;
  margin-bottom:20px;
  border-radius:15px;
}

.logout{
  float:right;
  background:#ff4d4d;
  padding:6px;
  cursor:pointer;
}

/* INPUT */
input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:white;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid rgba(255,255,255,0.3);
  padding:8px;
  text-align:center;
}

.pending{color:yellow;}
.approved{color:#00ffcc;}
.rejected{color:#ff6b6b;}
</style>
</head>

<body>

<div class="container">

<!-- USER -->
<div class="box">
<div class="logout" onclick="logout()">Logout</div>
<h2>Employee Dashboard</h2>
<div id="userInfo"></div>
</div>

<!-- 📢 ANNOUNCEMENT -->
<div class="box">
<h3>📢 Announcements</h3>
<div id="announceList"></div>
</div>

<!-- FORM -->
<div class="box">
<h3>Request</h3>

<select id="type">
<option>Leave</option>
<option>Day Off</option>
<option>Birthday Leave</option>
<option>Vacation Leave</option>
</select>

<input type="date" id="date">
<textarea id="reason"></textarea>

<button onclick="submitRequest()">Submit</button>
</div>

<!-- TABLE -->
<div class="box">
<h3>My Requests</h3>

<table>
<thead>
<tr>
<th>Type</th>
<th>Date</th>
<th>Reason</th>
<th>Status</th>
</tr>
</thead>
<tbody id="reqTable"></tbody>
</table>

</div>

</div>

<script>

let user=JSON.parse(localStorage.getItem("empSession"));
if(!user){window.location.href="login.html";}

userInfo.innerHTML=user.fname+" "+user.lname;

let requests=JSON.parse(localStorage.getItem("requests"))||[];

/* SUBMIT */
function submitRequest(){
  let r={
    name:user.fname+" "+user.lname,
    type:type.value,
    date:date.value,
    reason:reason.value,
    status:"Pending"
  };

  requests.push(r);
  localStorage.setItem("requests",JSON.stringify(requests));
  loadRequests();
}

/* LOAD REQUEST */
function loadRequests(){
  let tbody=reqTable;
  tbody.innerHTML="";

  requests.filter(r=>r.name===user.fname+" "+user.lname)
  .forEach(r=>{
    tbody.innerHTML+=`
    <tr>
    <td>${r.type}</td>
    <td>${r.date}</td>
    <td>${r.reason}</td>
    <td class="${r.status.toLowerCase()}">${r.status}</td>
    </tr>`;
  });
}

/* ANNOUNCEMENT */
function loadAnnouncements(){
  let announcements=JSON.parse(localStorage.getItem("announcements"))||[];
  let box=document.getElementById("announceList");

  box.innerHTML="";
  announcements.slice().reverse().forEach(a=>{
    box.innerHTML+=`
    <div style="margin-bottom:5px;padding:6px;background:rgba(255,255,255,0.1);border-radius:6px;">
      📢 ${a.text}<br>
      <small>${a.date}</small>
    </div>`;
  });
}

function logout(){
  localStorage.removeItem("empSession");
  window.location.href="login.html";
}

loadRequests();
loadAnnouncements();

</script>

</body>
</html>
