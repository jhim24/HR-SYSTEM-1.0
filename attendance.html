<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #141e30, #243b55);
  padding: 20px;
  color: white;
}

h2 { text-align:center; }

.top-bar { margin-bottom:10px; }

.back-btn {
  background:#34495e;
  color:white;
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.form {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap:10px;
}

input, select {
  padding:10px;
  border:none;
  border-radius:6px;
}

button {
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.save { background:#2ecc71; }
.update { background:#f39c12; }
.cancel { background:#7f8c8d; }
.delete { background:#e74c3c; }

/* TABLE */
.table-box {
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  overflow-x:auto;
}

table {
  border-collapse: collapse;
  min-width:1200px;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:11px;
}

th {
  background:#2ecc71;
  color:white;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href="login.html";
}
</script>

</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<h2>ATTENDANCE SYSTEM (MANUAL)</h2>

<div class="card">
  <div class="form">

    <select id="employee"></select>
    <input type="date" id="date">

    <input type="time" id="timein">
    <input type="time" id="breakout">
    <input type="time" id="breakin">
    <input type="time" id="timeout">

    <button class="save" onclick="saveAttendance()">Save</button>
    <button class="update" onclick="updateAttendance()" id="updateBtn" style="display:none;">Update</button>
    <button class="cancel" onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancel</button>

  </div>
</div>

<div class="table-box">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time In</th>
        <th>Break Out</th>
        <th>Break In</th>
        <th>Time Out</th>
        <th>Late</th>
        <th>OT</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];
let editIndex = -1;

/* BACK */
function goBack(){
  window.location.href="index.html";
}

/* LOAD EMPLOYEE */
function loadEmployees(){
  employee.innerHTML = "<option value=''>Select Employee</option>";

  employees.forEach((e,i)=>{
    employee.innerHTML += `<option value="${i}">${e.fname} ${e.lname}</option>`;
  });
}

/* TIME TO HOURS */
function toHours(t){
  if(!t) return 0;
  let [h,m] = t.split(":");
  return parseInt(h) + (parseInt(m)/60);
}

/* COMPUTE */
function computeData(){
  let tin = toHours(timein.value);
  let tout = toHours(timeout.value);
  let bout = toHours(breakout.value);
  let bin = toHours(breakin.value);

  let breakTime = (bin - bout) || 0;
  let total = (tout - tin) - breakTime;

  let late = tin > 8 ? (tin - 8).toFixed(2) : 0;
  let ot = tout > 17 ? (tout - 17).toFixed(2) : 0;

  return {late, ot, total: total.toFixed(2)};
}

/* SAVE */
function saveAttendance(){
  let i = employee.value;
  if(i==="") return alert("Select employee");

  let empName = employees[i].fname + " " + employees[i].lname;

  let comp = computeData();

  attendance.push({
    name: empName,
    date: date.value,
    timein: timein.value,
    breakout: breakout.value,
    breakin: breakin.value,
    timeout: timeout.value,
    ...comp
  });

  save(); display(); clearForm();
}

/* EDIT */
function editAttendance(i){
  let a = attendance[i];

  date.value = a.date;
  timein.value = a.timein;
  breakout.value = a.breakout;
  breakin.value = a.breakin;
  timeout.value = a.timeout;

  editIndex = i;

  updateBtn.style.display="inline-block";
  cancelBtn.style.display="inline-block";
}

/* UPDATE */
function updateAttendance(){
  if(editIndex === -1) return;

  let comp = computeData();

  attendance[editIndex] = {
    ...attendance[editIndex],
    date: date.value,
    timein: timein.value,
    breakout: breakout.value,
    breakin: breakin.value,
    timeout: timeout.value,
    ...comp
  };

  save(); display(); cancelEdit();
}

/* CANCEL */
function cancelEdit(){
  editIndex = -1;
  clearForm();
  updateBtn.style.display="none";
  cancelBtn.style.display="none";
}

/* DELETE */
function del(i){
  if(confirm("Delete?")){
    attendance.splice(i,1);
    save(); display();
  }
}

/* DISPLAY */
function display(){
  table.innerHTML="";

  attendance.forEach((a,i)=>{
    table.innerHTML += `
      <tr>
        <td>${a.name}</td>
        <td>${a.date}</td>
        <td>${a.timein}</td>
        <td>${a.breakout}</td>
        <td>${a.breakin}</td>
        <td>${a.timeout}</td>
        <td>${a.late}</td>
        <td>${a.ot}</td>
        <td>${a.total}</td>
        <td>
          <button onclick="editAttendance(${i})">Edit</button>
          <button class="delete" onclick="del(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* HELPERS */
function save(){
  localStorage.setItem("attendance", JSON.stringify(attendance));
}

function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

/* INIT */
loadEmployees();
display();
</script>

</body>
</html>
