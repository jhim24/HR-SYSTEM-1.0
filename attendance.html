<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI';}

body{
  margin:0;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

.wrapper{display:flex;height:100vh;}

.sidebar{
  width:240px;
  background:rgba(0,0,0,0.6);
  padding:20px;
}

.menu{list-style:none;padding:0;}
.menu li{padding:10px;cursor:pointer;border-radius:6px;}
.menu li:hover{background:rgba(255,255,255,0.2);}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* HEADER FORM */
.top-form{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input, select{
  padding:6px;
  margin:3px;
  border-radius:5px;
  border:none;
  font-size:12px;
}

/* TABLE */
.table-box{
  background:#eaf4ff;
  border-radius:10px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  color:#2c3e50;
  font-size:12px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:#3c89b8;
  color:white;
}

/* BUTTON */
.btn{
  padding:3px 6px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.add{background:#2ecc71;color:white;}
.edit{background:#3498db;color:white;}
.delete{background:#e74c3c;color:white;}

</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
  <h3>HR System</h3>
  <ul class="menu">
    <li onclick="goPage('index.html')">🏠 Dashboard</li>
    <li onclick="goPage('employee.html')">👨‍💼 Employees</li>
    <li onclick="goPage('attendance.html')">🕒 Attendance</li>
  </ul>
</div>

<div class="main">

<h2>Daily Attendance</h2>

<!-- TOP INPUT -->
<div class="top-form">
  <input id="name" placeholder="Employee Name">
  
  <select id="status">
    <option>Attended</option>
    <option>Late</option>
    <option>Sick Leave</option>
    <option>Vacation</option>
  </select>

  <input type="time" id="in">
  <input type="time" id="out">

  <button class="btn add" onclick="addRow()">Add</button>
</div>

<!-- TABLE -->
<div class="table-box">
<table id="tbl">
<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Time In</th>
<th>Time Out</th>
<th>Total Hours</th>
<th>Late</th>
<th>OT</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("attendance")) || [];
let editIndex = -1;

// COMPUTE
function compute(inTime, outTime){
  if(!inTime || !outTime) return {total:0, late:0, ot:0};

  let start = new Date("2000-01-01 "+inTime);
  let end = new Date("2000-01-01 "+outTime);

  let hours = (end - start) / 1000 / 60 / 60;

  let late = start > new Date("2000-01-01 08:00") ? (start - new Date("2000-01-01 08:00"))/1000/60 : 0;

  let ot = hours > 8 ? hours - 8 : 0;

  return {
    total: hours.toFixed(2),
    late: Math.floor(late),
    ot: ot.toFixed(2)
  };
}

// ADD / UPDATE
function addRow(){
  let c = compute(in.value, out.value);

  let row = {
    name:name.value,
    status:status.value,
    in:in.value,
    out:out.value,
    total:c.total,
    late:c.late,
    ot:c.ot
  };

  if(editIndex === -1){
    data.push(row);
  } else {
    data[editIndex] = row;
    editIndex = -1;
  }

  localStorage.setItem("attendance", JSON.stringify(data));
  render();
}

// EDIT
function editRow(i){
  let r = data[i];
  name.value = r.name;
  status.value = r.status;
  in.value = r.in;
  out.value = r.out;
  editIndex = i;
}

// DELETE
function deleteRow(i){
  if(confirm("Delete?")){
    data.splice(i,1);
    localStorage.setItem("attendance", JSON.stringify(data));
    render();
  }
}

// RENDER
function render(){
  let tbody = document.querySelector("#tbl tbody");
  tbody.innerHTML = "";

  data.forEach((r,i)=>{
    tbody.innerHTML += `
    <tr>
      <td>${r.name}</td>
      <td>${r.status}</td>
      <td>${r.in}</td>
      <td>${r.out}</td>
      <td>${r.total}</td>
      <td>${r.late}</td>
      <td>${r.ot}</td>
      <td>
        <button class="btn edit" onclick="editRow(${i})">Edit</button>
        <button class="btn delete" onclick="deleteRow(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

function goPage(p){window.location.href=p;}

render();
</script>

</body>
</html>
