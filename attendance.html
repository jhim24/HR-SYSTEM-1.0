<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI';}

body{
  margin:0;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

.wrapper{display:flex;height:100vh;}

.sidebar{
  width:240px;
  background:rgba(0,0,0,0.6);
  padding:20px;
}

.menu li{list-style:none;padding:10px;cursor:pointer;}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

input, select{
  padding:6px;
  margin:3px;
  border:none;
  border-radius:5px;
}

/* TABLE */
.table-box{
  background:#eaf4ff;
  border-radius:10px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  color:#2c3e50;
  font-size:12px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

th{background:#3c89b8;color:white;}

.btn{
  padding:4px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.add{background:#2ecc71;color:white;}
.edit{background:#3498db;color:white;}
.delete{background:#e74c3c;color:white;}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
<h3>HR System</h3>
<ul class="menu">
<li onclick="goPage('index.html')">Dashboard</li>
<li onclick="goPage('employee.html')">Employees</li>
<li onclick="goPage('attendance.html')">Attendance</li>
</ul>
</div>

<div class="main">

<h2>Attendance</h2>

<div>
<select id="emp"></select>
<input type="date" id="date">
<input type="time" id="timeIn">
<input type="time" id="timeOut">
<input type="number" id="breakTime" placeholder="Break (min)">
<button class="btn add" onclick="addRow()">Save</button>
</div>

<br>

<div class="table-box">
<table id="tbl">
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>In</th>
<th>Out</th>
<th>Break</th>
<th>Total</th>
<th>Late</th>
<th>OT</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let data = JSON.parse(localStorage.getItem("attendance")) || [];
let editIndex = -1;

/* LOAD EMP */
function loadEmp(){
  let select = document.getElementById("emp");
  select.innerHTML="";
  employees.forEach(e=>{
    let name = e.fname + " " + e.lname;
    select.innerHTML += `<option>${name}</option>`;
  });
}

/* COMPUTE */
function compute(tin, tout, br){
  if(!tin || !tout) return {total:0,late:0,ot:0};

  let s = new Date("2000-01-01 "+tin);
  let e = new Date("2000-01-01 "+tout);

  let hours = (e-s)/1000/60/60;
  hours -= (br||0)/60;

  let late = s > new Date("2000-01-01 08:00")
    ? (s - new Date("2000-01-01 08:00"))/1000/60
    : 0;

  let ot = hours > 8 ? hours-8 : 0;

  return {
    total:hours.toFixed(2),
    late:Math.floor(late),
    ot:ot.toFixed(2)
  };
}

/* ADD */
function addRow(){

  let name = document.getElementById("emp").value;
  let date = document.getElementById("date").value;
  let tin = document.getElementById("timeIn").value;
  let tout = document.getElementById("timeOut").value;
  let br = document.getElementById("breakTime").value;

  if(!name || !date){
    alert("Fill required fields");
    return;
  }

  let c = compute(tin,tout,br);

  let row = {name,date,tin,tout,br,total:c.total,late:c.late,ot:c.ot};

  if(editIndex===-1){
    data.push(row);
  } else {
    data[editIndex]=row;
    editIndex=-1;
  }

  localStorage.setItem("attendance",JSON.stringify(data));
  render();
}

/* EDIT */
function editRow(i){
  let r=data[i];

  document.getElementById("emp").value=r.name;
  document.getElementById("date").value=r.date;
  document.getElementById("timeIn").value=r.tin;
  document.getElementById("timeOut").value=r.tout;
  document.getElementById("breakTime").value=r.br;

  editIndex=i;
}

/* DELETE */
function deleteRow(i){
  if(confirm("Delete?")){
    data.splice(i,1);
    localStorage.setItem("attendance",JSON.stringify(data));
    render();
  }
}

/* RENDER */
function render(){
  let tbody=document.querySelector("#tbl tbody");
  tbody.innerHTML="";

  data.forEach((r,i)=>{
    tbody.innerHTML+=`
    <tr>
      <td>${r.name}</td>
      <td>${r.date}</td>
      <td>${r.tin}</td>
      <td>${r.tout}</td>
      <td>${r.br}</td>
      <td>${r.total}</td>
      <td>${r.late}</td>
      <td>${r.ot}</td>
      <td>
        <button onclick="editRow(${i})">Edit</button>
        <button onclick="deleteRow(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

function goPage(p){window.location.href=p;}

loadEmp();
render();
</script>

</body>
</html>
