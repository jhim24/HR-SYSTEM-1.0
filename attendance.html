<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #141e30, #243b55);
  padding: 20px;
  color: white;
}

h2 { text-align:center; }

.top-bar { margin-bottom:10px; }

.back-btn {
  background:#34495e;
  color:white;
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.form {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.in { background:#2ecc71; }
.break { background:#f1c40f; }
.out { background:#e74c3c; }

/* TABLE */
.table-box {
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  overflow-x:auto;
}

table {
  border-collapse: collapse;
  min-width:1200px;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:11px;
}

th {
  background:#2ecc71;
  color:white;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href="login.html";
}
</script>

</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<h2>ATTENDANCE SYSTEM</h2>

<div class="card">
  <div class="form">
    <select id="employee"></select>

    <button class="in" onclick="timeIn()">Time In</button>
    <button class="break" onclick="breakOut()">Break Out</button>
    <button class="break" onclick="breakIn()">Break In</button>
    <button class="out" onclick="timeOut()">Time Out</button>
  </div>
</div>

<div class="table-box">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time In</th>
        <th>Break Out</th>
        <th>Break In</th>
        <th>Time Out</th>
        <th>Late</th>
        <th>OT</th>
        <th>Total Hours</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];

/* BACK */
function goBack(){
  window.location.href="index.html";
}

/* LOAD EMPLOYEE */
function loadEmployees(){
  employee.innerHTML = "<option value=''>Select Employee</option>";

  employees.forEach((e,i)=>{
    employee.innerHTML += `<option value="${i}">${e.fname} ${e.lname}</option>`;
  });
}

/* GET LAST RECORD */
function getLast(name){
  return attendance.reverse().find(a => a.name === name && !a.timeout);
}

/* TIME IN */
function timeIn(){
  let i = employee.value;
  if(i==="") return alert("Select employee");

  let now = new Date();

  attendance.push({
    name: employees[i].fname + " " + employees[i].lname,
    date: now.toLocaleDateString(),
    timein: now,
    breakout:"",
    breakin:"",
    timeout:"",
  });

  save(); display();
}

/* BREAK OUT */
function breakOut(){
  let i = employee.value;
  let name = employees[i].fname + " " + employees[i].lname;
  let rec = getLast(name);
  if(rec) rec.breakout = new Date();
  save(); display();
}

/* BREAK IN */
function breakIn(){
  let i = employee.value;
  let name = employees[i].fname + " " + employees[i].lname;
  let rec = getLast(name);
  if(rec) rec.breakin = new Date();
  save(); display();
}

/* TIME OUT */
function timeOut(){
  let i = employee.value;
  let name = employees[i].fname + " " + employees[i].lname;
  let rec = getLast(name);

  if(rec){
    rec.timeout = new Date();

    /* COMPUTE */
    let start = new Date(rec.timein);
    let end = new Date(rec.timeout);

    let total = (end - start) / 1000 / 60 / 60;

    if(rec.breakout && rec.breakin){
      let b1 = new Date(rec.breakout);
      let b2 = new Date(rec.breakin);
      total -= (b2 - b1) / 1000 / 60 / 60;
    }

    /* LATE (after 8AM) */
    let late = start.getHours() >= 8 ? (start.getHours() - 8) : 0;

    /* OT (after 5PM) */
    let ot = end.getHours() > 17 ? (end.getHours() - 17) : 0;

    rec.total = total.toFixed(2);
    rec.late = late;
    rec.ot = ot;
  }

  save(); display();
}

/* DISPLAY */
function display(){
  table.innerHTML="";

  attendance.forEach(a=>{
    table.innerHTML += `
      <tr>
        <td>${a.name}</td>
        <td>${a.date}</td>
        <td>${format(a.timein)}</td>
        <td>${format(a.breakout)}</td>
        <td>${format(a.breakin)}</td>
        <td>${format(a.timeout)}</td>
        <td>${a.late || 0}</td>
        <td>${a.ot || 0}</td>
        <td>${a.total || 0}</td>
      </tr>
    `;
  });
}

/* FORMAT TIME */
function format(t){
  if(!t) return "";
  return new Date(t).toLocaleTimeString();
}

/* SAVE */
function save(){
  localStorage.setItem("attendance", JSON.stringify(attendance));
}

/* INIT */
loadEmployees();
display();
</script>

</body>
</html>
