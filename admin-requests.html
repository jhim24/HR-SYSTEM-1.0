<!DOCTYPE html>
<html>
<head>
<title>Admin Requests</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI';}

body{
  margin:0;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  padding:20px;
  color:white;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
}

/* FLOAT BOX */
.box{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* 🔙 BACK BUTTON */
.back{
  background:#00c6ff;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  background:rgba(255,255,255,0.1);
}

th,td{
  padding:8px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.2);
}

th{
  background:rgba(0,0,0,0.4);
}

/* STATUS */
.pending{color:yellow;}
.approved{color:#00ffcc;}
.rejected{color:#ff6b6b;}

/* BUTTON */
.btn{
  padding:5px 8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:2px;
}

.approve{background:#2ecc71;color:white;}
.reject{background:#e74c3c;color:white;}
</style>

</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="box header">
  <h2>Admin Request Panel</h2>
  <div class="back" onclick="goBack()">⬅ Back</div>
</div>

<!-- TABLE -->
<div class="box">

<table>
<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Date</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reqTable"></tbody>
</table>

</div>

</div>

<script>

/* LOAD REQUESTS */
let requests = JSON.parse(localStorage.getItem("requests")) || [];

function loadRequests(){

  reqTable.innerHTML="";

  requests.forEach((r,i)=>{

    let statusClass = r.status.toLowerCase();

    reqTable.innerHTML += `
    <tr>
      <td>${r.name}</td>
      <td>${r.type}</td>
      <td>${r.date}</td>
      <td>${r.reason}</td>
      <td class="${statusClass}">${r.status}</td>
      <td>
        <button class="btn approve" onclick="updateStatus(${i},'Approved')">Approve</button>
        <button class="btn reject" onclick="updateStatus(${i},'Rejected')">Reject</button>
      </td>
    </tr>`;
  });

}

function updateStatus(i,status){
  requests[i].status = status;
  localStorage.setItem("requests", JSON.stringify(requests));
  loadRequests();
}

/* 🔙 BACK FUNCTION */
function goBack(){
  window.location.href = "index.html";
}

loadRequests();

</script>

</body>
</html>
