<!DOCTYPE html>
<html>
<head>
<title>Admin Requests</title>

<style>
body{
  font-family:Arial;
  background:#f0f0f0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

th{
  background:#2c3e50;
  color:white;
}

/* BUTTON */
.btn{
  padding:5px;
  border:none;
  cursor:pointer;
  color:white;
}

.approve{background:#2ecc71;}
.reject{background:#e74c3c;}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h2>Employee Requests</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Date</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reqTable"></tbody>
</table>

</div>

</div>

<script>

let requests = JSON.parse(localStorage.getItem("requests")) || [];

/* LOAD */
function load(){

  let tbody = document.getElementById("reqTable");
  tbody.innerHTML = "";

  requests.forEach((r,i)=>{

    tbody.innerHTML += `
    <tr>
      <td>${r.name}</td>
      <td>${r.type}</td>
      <td>${r.date}</td>
      <td>${r.reason}</td>
      <td>${r.status}</td>
      <td>
        <button class="btn approve" onclick="approve(${i})">Approve</button>
        <button class="btn reject" onclick="reject(${i})">Reject</button>
      </td>
    </tr>`;
  });

}

/* APPROVE */
function approve(i){
  requests[i].status = "Approved";
  localStorage.setItem("requests", JSON.stringify(requests));
  load();
}

/* REJECT */
function reject(i){
  requests[i].status = "Rejected";
  localStorage.setItem("requests", JSON.stringify(requests));
  load();
}

load();

</script>

</body>
</html>
