<!DOCTYPE html>
<html>
<head>
<title>Admin Requests</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI';}

body{
  margin:0;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  padding:20px;
  color:white;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
}

/* FLOATING CARD */
.box{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

/* TITLE */
h2{
  margin-top:0;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:13px;
  background:rgba(255,255,255,0.1);
}

th,td{
  padding:10px;
  text-align:center;
}

th{
  background:rgba(0,0,0,0.4);
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.2);
}

/* STATUS COLORS */
.pending{color:yellow;}
.approved{color:#00ffcc;}
.rejected{color:#ff4d4d;}

/* BUTTON */
.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:2px;
  color:white;
  font-size:12px;
  transition:0.3s;
}

.approve{
  background:linear-gradient(45deg,#00c853,#00e676);
}

.reject{
  background:linear-gradient(45deg,#ff1744,#ff5252);
}

.btn:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="container">

<div class="box">

<h2>📋 Employee Requests</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Date</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reqTable"></tbody>

</table>

</div>

</div>

<script>

let requests = JSON.parse(localStorage.getItem("requests")) || [];

/* LOAD */
function load(){

  let tbody = document.getElementById("reqTable");
  tbody.innerHTML = "";

  requests.forEach((r,i)=>{

    let statusClass = r.status.toLowerCase();

    tbody.innerHTML += `
    <tr>
      <td>${r.name}</td>
      <td>${r.type}</td>
      <td>${r.date}</td>
      <td>${r.reason}</td>
      <td class="${statusClass}">${r.status}</td>
      <td>
        <button class="btn approve" onclick="approve(${i})">Approve</button>
        <button class="btn reject" onclick="reject(${i})">Reject</button>
      </td>
    </tr>`;
  });

}

/* APPROVE */
function approve(i){
  requests[i].status = "Approved";
  localStorage.setItem("requests", JSON.stringify(requests));
  load();
}

/* REJECT */
function reject(i){
  requests[i].status = "Rejected";
  localStorage.setItem("requests", JSON.stringify(requests));
  load();
}

load();

</script>

</body>
</html>
