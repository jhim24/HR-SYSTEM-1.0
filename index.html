<!DOCTYPE html>
<html>
<head>
  <title>HR System Dashboard</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  display: flex;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  height: 100vh;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.menu {
  list-style: none;
  padding: 0;
}

.menu li {
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.menu li:hover {
  background: rgba(255,255,255,0.2);
}

/* LOGOUT */
.logout {
  margin-top: 30px;
  background: #e74c3c;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

/* MAIN CONTENT */
.main {
  margin-left: 250px;
  padding: 20px;
  width: 100%;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* GRID */
.container {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  font-size: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-5px) scale(1.03);
  background: rgba(255,255,255,0.2);
}

/* ICON */
.icon {
  font-size: 35px;
  display: block;
  margin-bottom: 10px;
}

/* COLORS */
.emp { border-left: 5px solid #2ecc71; }
.att { border-left: 5px solid #f1c40f; }
.pay { border-left: 5px solid #3498db; }
.payslip { border-left: 5px solid #9b59b6; }
.history { border-left: 5px solid #e67e22; }

</style>

<script>
// LOGIN PROTECTION
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>HR System</h2>

  <ul class="menu">
    <li onclick="goPage('index.html')">🏠 Dashboard</li>
    <li onclick="goPage('employee.html')">👨‍💼 Employee</li>
    <li onclick="goPage('attendance.html')">🕒 Attendance</li>
    <li onclick="goPage('payroll.html')">💰 Payroll</li>
    <li onclick="goPage('payslip.html')">🧾 Payslip</li>
    <li onclick="goPage('payroll-history.html')">📄 History</li>
  </ul>

  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Dashboard</h2>
  </div>

  <div class="container">

    <div class="card emp" onclick="goPage('employee.html')">
      <span class="icon">👨‍💼</span>
      Employee
    </div>

    <div class="card att" onclick="goPage('attendance.html')">
      <span class="icon">🕒</span>
      Attendance
    </div>

    <div class="card pay" onclick="goPage('payroll.html')">
      <span class="icon">💰</span>
      Payroll
    </div>

    <div class="card payslip" onclick="goPage('payslip.html')">
      <span class="icon">🧾</span>
      Payslip
    </div>

    <div class="card history" onclick="goPage('payroll-history.html')">
      <span class="icon">📄</span>
      Payroll History
    </div>

  </div>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function goPage(page){
  window.location.href = page;
}
</script>

</body>
</html>
