<!DOCTYPE html>
<html>
<head>
  <title>HR Management</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY (para readable text) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* WRAPPER */
.wrapper {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: rgba(0,0,0,0.6);
  padding: 25px;
}

/* TITLE */
.sidebar h2 {
  margin-bottom: 30px;
}

/* MENU */
.menu {
  list-style: none;
  padding: 0;
}

.menu li {
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.menu li:hover {
  background: rgba(255,255,255,0.2);
}

/* LOGOUT */
.logout {
  margin-top: 30px;
  background: #e74c3c;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

/* MAIN HERO */
.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

/* HERO TEXT */
.hero h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 20px;
  opacity: 0.9;
}

</style>

<script>
// LOGIN PROTECTION
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>HR System</h2>

    <ul class="menu">
      <li onclick="goPage('index.html')">🏠 Dashboard</li>
      <li onclick="goPage('employee.html')">👨‍💼 Employees</li>
      <li onclick="goPage('attendance.html')">🕒 Attendance</li>
      <li onclick="goPage('payroll.html')">💰 Payroll</li>
      <li onclick="goPage('payslip.html')">🧾 Payslips</li>
      <li onclick="goPage('payroll-history.html')">📄 History</li>
    </ul>

    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <!-- MAIN (NO DASHBOARD CARDS) -->
  <div class="main">
    <div class="hero">
      <h1>HR Management System</h1>
      <p>Manage Employees, Attendance, Payroll & More</p>
    </div>
  </div>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function goPage(page){
  window.location.href = page;
}
</script>

</body>
</html>
