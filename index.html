<!DOCTYPE html>
<html>
<head>
  <title>HR System Dashboard</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  padding: 20px;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logout {
  background: #e74c3c;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
}

/* GRID CARDS */
.container {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  font-size: 18px;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.2);
}

.icon {
  font-size: 35px;
  margin-bottom: 10px;
}

/* ===== 🎂 BIRTHDAY SECTION ===== */
.bday-box{
  margin-top:40px;
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
}

.bday-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
}

.bday-card{
  background:#e6f4ea;
  padding:10px;
  border-radius:12px;
  text-align:center;
  color:#2c3e50;
}

.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#2ecc71;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

.bday-name{
  margin-top:5px;
  font-weight:bold;
}

.bday-date{
  font-size:12px;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}
</script>

</head>

<body>

<div class="header">
  <h2>HR SYSTEM DASHBOARD</h2>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- MAIN CARDS -->
<div class="container">

  <div class="card" onclick="goPage('employee.html')">
    <div class="icon">👨‍💼</div>
    Employee
  </div>

  <div class="card" onclick="goPage('attendance.html')">
    <div class="icon">🕒</div>
    Attendance
  </div>

  <div class="card" onclick="goPage('payroll.html')">
    <div class="icon">💰</div>
    Payroll
  </div>

  <div class="card" onclick="goPage('payslip.html')">
    <div class="icon">🧾</div>
    Payslip
  </div>

</div>

<!-- 🎂 BIRTHDAY SECTION -->
<div class="bday-box">
  <h3>🎉 Upcoming Celebration</h3>
  <div id="bdayGrid" class="bday-grid"></div>
</div>

<script>

/* NAV */
function goPage(p){
  window.location.href = p;
}

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

/* 🎂 BIRTHDAY SYSTEM */
function loadBirthdayCards(){
  let employees = JSON.parse(localStorage.getItem("employees")) || [];
  let grid = document.getElementById("bdayGrid");

  let today = new Date();
  let list = [];

  employees.forEach(e=>{
    if(!e.birthdate) return;

    let b = new Date(e.birthdate);
    let thisYear = new Date(today.getFullYear(), b.getMonth(), b.getDate());

    let diff = Math.ceil((thisYear - today)/(1000*60*60*24));

    if(diff >= 0 && diff <= 30){
      list.push({
        name: `${e.fname} ${e.lname}`,
        date: thisYear,
        diff
      });
    }
  });

  list.sort((a,b)=>a.diff-b.diff);

  grid.innerHTML = "";

  list.forEach(e=>{
    let initials = e.name.split(" ").map(n=>n[0]).join("");

    grid.innerHTML += `
      <div class="bday-card">
        <div>🎂 Birthday</div>
        <div class="avatar">${initials}</div>
        <div class="bday-name">${e.name}</div>
        <div class="bday-date">${e.date.toLocaleDateString()}</div>
      </div>
    `;
  });

  if(list.length === 0){
    grid.innerHTML = "No upcoming celebrations 🎈";
  }
}

/* LOAD */
loadBirthdayCards();

</script>

</body>
</html>
