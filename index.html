<!DOCTYPE html>
<html>
<head>
  <title>HR System Dashboard</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #1abc9c, #3498db);
  padding: 20px;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h2 {
  margin: 0;
}

/* LOGOUT */
.logout {
  background: #e74c3c;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
}

/* GRID */
.container {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.25);
}

/* LINK */
.card a {
  text-decoration: none;
  color: white;
  font-size: 18px;
}
</style>

<script>
// LOGIN PROTECTION
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<div class="header">
  <h2>HR SYSTEM DASHBOARD</h2>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="container">

  <div class="card">
    <a href="employee.html" target="_blank">👨‍💼 Employee</a>
  </div>

  <div class="card">
    <a href="attendance.html" target="_blank">🕒 Attendance</a>
  </div>

  <div class="card">
    <a href="payroll.html" target="_blank">💰 Payroll</a>
  </div>

  <div class="card">
    <a href="payslip.html" target="_blank">🧾 Payslip</a>
  </div>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}
</script>

</body>
</html>
