<!DOCTYPE html>
<html>
<head>
<title>HR System Dashboard</title>

<style>
*{box-sizing:border-box;font-family:Arial;}

body{
  margin:0;
  display:flex;
  height:100vh;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

/* OVERLAY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:rgba(0,0,0,0.7);
  padding:20px;
}

.menu{list-style:none;padding:0;}
.menu li{
  padding:10px;
  cursor:pointer;
  border-radius:6px;
}
.menu li:hover{
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
}

/* LEFT CONTENT */
.left{
  flex:3;
  padding:20px;
}

/* RIGHT BOX */
.right{
  width:300px;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#e74c3c;
  padding:8px 15px;
  border-radius:6px;
  cursor:pointer;
}

/* CARDS */
.container{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  padding:30px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.icon{
  font-size:30px;
}

/* ANNOUNCEMENT */
.announce{
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:10px;
}

/* BIRTHDAY BOX */
.birthday{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

</style>

<script>
if(localStorage.getItem("loggedIn")!=="true"){
  window.location.href="login.html";
}
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>HR SYSTEM</h3>
<ul class="menu">
<li onclick="goPage('employee.html')">Employee</li>
<li onclick="goPage('attendance.html')">Attendance</li>
<li onclick="goPage('payroll.html')">Payroll</li>
<li onclick="goPage('payslip.html')">Payslip</li>
<li onclick="goPage('admin-requests.html')">Requests</li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<!-- LEFT -->
<div class="left">

<div class="header">
<h2>Dashboard</h2>
<div class="logout" onclick="logout()">Logout</div>
</div>

<!-- CARDS -->
<div class="container">
<div class="card" onclick="goPage('employee.html')">👨‍💼 Employee</div>
<div class="card" onclick="goPage('attendance.html')">🕒 Attendance</div>
<div class="card" onclick="goPage('payroll.html')">💰 Payroll</div>
<div class="card" onclick="goPage('payslip.html')">🧾 Payslip</div>
</div>

<!-- 📢 ANNOUNCEMENT -->
<div class="announce">
<h3>📢 Announcements</h3>

<input id="announceInput" placeholder="Enter..." style="width:100%;padding:8px;border-radius:6px;border:none;">
<button onclick="addAnnouncement()">Post</button>

<div id="announceList"></div>
</div>

</div>

<!-- RIGHT SIDE -->
<div class="right">

<!-- 🎂 BIRTHDAY -->
<div class="birthday">
<h3>🎂 Birthday Today</h3>
<div id="bdayList"></div>
</div>

</div>

</div>

<script>

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href="login.html";
}

function goPage(p){window.location.href=p;}

/* ANNOUNCEMENT */
let announcements = JSON.parse(localStorage.getItem("announcements"))||[];

function addAnnouncement(){
  if(!announceInput.value) return;

  announcements.push({
    text:announceInput.value,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("announcements",JSON.stringify(announcements));
  announceInput.value="";
  loadAnnouncements();
}

function loadAnnouncements(){
  announceList.innerHTML="";
  announcements.slice().reverse().forEach(a=>{
    announceList.innerHTML+=`
    <div>📢 ${a.text}<br><small>${a.date}</small></div>`;
  });
}

/* 🎂 BIRTHDAY SYSTEM */
function loadBirthday(){

  let emp = JSON.parse(localStorage.getItem("employees"))||[];
  let today = new Date().toISOString().slice(5,10);

  let celebrants = emp.filter(e=>{
    if(!e.birthdate) return false;
    return e.birthdate.slice(5,10)===today;
  });

  if(celebrants.length===0){
    bdayList.innerHTML="No birthday today";
  }else{
    bdayList.innerHTML = celebrants.map(e=>
      `🎉 ${e.fname} ${e.lname}`
    ).join("<br>");
  }
}

loadAnnouncements();
loadBirthday();

</script>

</body>
</html>
