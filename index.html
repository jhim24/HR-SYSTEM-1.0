<!DOCTYPE html>
<html>
<head>
  <title>HR System Dashboard</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #1abc9c, #3498db);
  padding: 20px;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h2 {
  margin: 0;
}

/* LOGOUT */
.logout {
  background: #e74c3c;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.logout:hover {
  background: #c0392b;
}

/* GRID */
.container {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  font-size: 18px;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.25);
}

/* ICON */
.icon {
  font-size: 30px;
  display: block;
  margin-bottom: 10px;
}
</style>

<script>
// LOGIN PROTECTION
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<div class="header">
  <h2>HR SYSTEM DASHBOARD</h2>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="container">

  <div class="card" onclick="goPage('employee.html')">
    <span class="icon">👨‍💼</span>
    Employee
  </div>

  <div class="card" onclick="goPage('attendance.html')">
    <span class="icon">🕒</span>
    Attendance
  </div>

  <div class="card" onclick="goPage('payroll.html')">
    <span class="icon">💰</span>
    Payroll
  </div>

  <div class="card" onclick="goPage('payslip.html')">
    <span class="icon">🧾</span>
    Payslip
  </div>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

/* SAME TAB NAVIGATION (FIXED) */
function goPage(page){
  window.location.href = page;
}
</script>

</body>
</html>
