<!DOCTYPE html>
<html>
<head>
<title>HR System Dashboard</title>

<style>
*{box-sizing:border-box;font-family:Arial;}

body{
  margin:0;
  display:flex;
  height:100vh;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:rgba(0,0,0,0.7);
  padding:20px;
}

.menu{list-style:none;padding:0;}
.menu li{
  padding:10px;
  cursor:pointer;
  border-radius:6px;
}
.menu li:hover{
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main{flex:1;display:flex;}
.left{flex:3;padding:20px;}
.right{width:300px;padding:20px;}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#e74c3c;
  padding:8px 15px;
  border-radius:6px;
  cursor:pointer;
}

/* 🍉 WELCOME */
.welcome-box{
  margin-top:15px;
  padding:20px;
  border-radius:15px;
  background: rgba(238,32,78,0.2);
  border:1px solid #EE204E;
  box-shadow:0 0 20px #EE204E;
}

/* 🔍 SEARCH */
.search-box input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

/* 📢 ANNOUNCE */
.announce{
  margin-top:20px;
  background: rgba(255,215,0,0.15);
  padding:15px;
  border-radius:10px;
  border:1px solid #FFD700;
  box-shadow:0 0 10px #FFD700;
}

/* 🎂 BIRTHDAY */
.birthday{
  background: rgba(242,0,60,0.2);
  padding:20px;
  border-radius:15px;
  text-align:center;
  border:1px solid #F2003C;
  box-shadow:0 0 15px #F2003C;
}

/* BADGE */
.badge{
  background:red;
  padding:2px 6px;
  border-radius:10px;
  font-size:12px;
  margin-left:5px;
}
</style>

<script>
if(localStorage.getItem("loggedIn")!=="true"){
  window.location.href="login.html";
}
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>HR SYSTEM</h3>
<ul class="menu">
<li onclick="goPage('employee.html')">Employee</li>
<li onclick="goPage('attendance.html')">Attendance</li>
<li onclick="goPage('payroll.html')">Payroll</li>
<li onclick="goPage('payslip.html')">Payslip</li>

<li onclick="goPage('admin-requests.html')">
📋 Requests <span id="reqBadge" class="badge"></span>
</li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<div class="left">

<div class="header">
<h2>Dashboard</h2>
<div class="logout" onclick="logout()">Logout</div>
</div>

<!-- 🍉 WELCOME -->
<div class="welcome-box">
<h2>Hi, Welcome 👋</h2>
<p>Have a nice day!</p>
</div>

<!-- 🔍 SEARCH -->
<div class="search-box">
<input id="searchEmp" placeholder="Search employee..." onkeyup="searchEmployee()">
<div id="searchResult"></div>
</div>

<!-- 📢 ANNOUNCE -->
<div class="announce">
<h3>📢 Announcements</h3>

<input id="announceInput" placeholder="Enter...">
<button onclick="addAnnouncement()">Post</button>

<div id="announceList"></div>
</div>

</div>

<div class="right">

<div class="birthday">
<h3>🎂 Birthday Today</h3>
<div id="bdayList"></div>
</div>

</div>

</div>

<!-- 👤 POPUP -->
<div id="empPopup" style="
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
">

<div style="
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px #00c6ff;
width:300px;
">
<h3>Employee Info</h3>
<div id="empDetails"></div>
<button onclick="closeEmp()">Close</button>
</div>

</div>

<script>

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href="login.html";
}

function goPage(p){window.location.href=p;}

/* 🔍 SEARCH */
function searchEmployee(){

  let keyword = searchEmp.value.toLowerCase();
  let emp = JSON.parse(localStorage.getItem("employees")) || [];

  let result = emp.filter(e =>
    (e.fname+" "+e.lname).toLowerCase().includes(keyword)
  );

  searchResult.innerHTML="";

  result.forEach(e=>{
    searchResult.innerHTML+=`
    <div onclick="showEmp('${e.fname}','${e.lname}')"
    style="padding:5px;background:#333;margin-top:5px;cursor:pointer;">
    ${e.fname} ${e.lname}
    </div>`;
  });
}

/* SHOW */
function showEmp(fname,lname){
  let emp = JSON.parse(localStorage.getItem("employees"))||[];
  let e = emp.find(x=>x.fname===fname && x.lname===lname);

  empDetails.innerHTML=`
  Name: ${e.fname} ${e.lname}<br>
  Position: ${e.position}<br>
  ID: ${e.empId}
  `;

  empPopup.style.display="flex";
}

function closeEmp(){
  empPopup.style.display="none";
}

/* ANNOUNCE */
let announcements = JSON.parse(localStorage.getItem("announcements"))||[];

function addAnnouncement(){
  announcements.push({text:announceInput.value});
  localStorage.setItem("announcements",JSON.stringify(announcements));
  loadAnnouncements();
}

function loadAnnouncements(){
  announceList.innerHTML="";
  announcements.forEach(a=>{
    announceList.innerHTML+=`<div>${a.text}</div>`;
  });
}

/* BIRTHDAY */
function loadBirthday(){
  let emp = JSON.parse(localStorage.getItem("employees"))||[];
  let today = new Date().toISOString().slice(5,10);

  let b = emp.filter(e=>e.birthdate && e.birthdate.slice(5,10)===today);

  bdayList.innerHTML = b.length ? b.map(e=>e.fname).join("<br>") : "No birthday";
}

/* BADGE */
function loadRequestBadge(){
  let r = JSON.parse(localStorage.getItem("requests"))||[];
  let p = r.filter(x=>x.status==="Pending").length;
  reqBadge.innerText = p>0?p:"";
}

loadAnnouncements();
loadBirthday();
loadRequestBadge();

</script>

</body>
</html>
