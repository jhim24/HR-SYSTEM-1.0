<!DOCTYPE html>
<html>
<head>
<title>HR Dashboard</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI';
}

body{
  margin:0;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

/* OVERLAY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* WRAPPER */
.wrapper{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:rgba(0,0,0,0.7);
  padding:20px;
}

.menu{
  list-style:none;
  padding:0;
}

.menu li{
  padding:10px;
  margin-bottom:8px;
  cursor:pointer;
  border-radius:6px;
}

.menu li:hover{
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* STATS */
.stats{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.stat-card{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
}

.stat-title{
  font-size:12px;
  color:#ccc;
}

.stat-value{
  font-size:22px;
  font-weight:bold;
}

/* BOXES */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:15px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
}

/* BDAY */
.bday-card{
  background:#e6f4ea;
  color:#2c3e50;
  padding:8px;
  border-radius:10px;
  margin-bottom:8px;
  text-align:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#2ecc71;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
}

/* LOGOUT */
.logout{
  margin-top:20px;
  background:#e74c3c;
  padding:10px;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href="login.html";
}
</script>

</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>HR System</h3>
<ul class="menu">
<li onclick="goPage('employee.html')">👨‍💼 Employee</li>
<li onclick="goPage('attendance.html')">🕒 Attendance</li>
<li onclick="goPage('payroll.html')">💰 Payroll</li>
<li onclick="goPage('payslip.html')">🧾 Payslip</li>
</ul>

<div class="logout" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
<h2>Dashboard</h2>
</div>

<!-- STATS -->
<div class="stats">
<div class="stat-card">
<div class="stat-title">Total Employees</div>
<div class="stat-value" id="totalEmp">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Attendance Records</div>
<div class="stat-value" id="totalAtt">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Payroll Records</div>
<div class="stat-value" id="totalPay">0</div>
</div>
</div>

<!-- GRID -->
<div class="grid">

<!-- LEFT -->
<div class="box">
<h4>System Overview</h4>
<p>HR System is running smoothly.</p>
</div>

<!-- RIGHT BDAY -->
<div class="box">
<h4>🎂 Birthdays</h4>
<div id="bdayList"></div>
</div>

</div>

</div>
</div>

<script>

/* NAV */
function goPage(p){window.location.href=p;}
function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href="login.html";
}

/* LOAD STATS */
function loadStats(){
  let emp = JSON.parse(localStorage.getItem("employees"))||[];
  let att = JSON.parse(localStorage.getItem("attendance"))||[];
  let pay = JSON.parse(localStorage.getItem("payroll"))||[];

  document.getElementById("totalEmp").innerText = emp.length;
  document.getElementById("totalAtt").innerText = att.length;
  document.getElementById("totalPay").innerText = pay.length;
}

/* BDAY */
function loadBirthday(){
  let employees = JSON.parse(localStorage.getItem("employees")) || [];
  let box = document.getElementById("bdayList");

  let today = new Date();

  employees.forEach(e=>{
    if(!e.birthdate) return;

    let b = new Date(e.birthdate);
    let thisYear = new Date(today.getFullYear(), b.getMonth(), b.getDate());

    let diff = Math.ceil((thisYear - today)/(1000*60*60*24));

    if(diff >= 0 && diff <= 30){

      let initials = (e.fname[0] || "") + (e.lname[0] || "");

      box.innerHTML += `
      <div class="bday-card">
        <div class="avatar">${initials}</div>
        <div>${e.fname} ${e.lname}</div>
        <div>${thisYear.toLocaleDateString()}</div>
      </div>`;
    }
  });

  if(box.innerHTML===""){
    box.innerHTML="No birthdays 🎈";
  }
}

loadStats();
loadBirthday();

</script>

</body>
</html>
