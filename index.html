<!DOCTYPE html>
<html>
<head>
<title>HR System Dashboard</title>

<style>
*{box-sizing:border-box;font-family:Arial;}

body{
  margin:0;
  display:flex;
  height:100vh;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  padding:20px;
  display:flex;
  flex-direction:column;

  background: linear-gradient(
    180deg,
    rgba(20,20,40,0.9),
    rgba(60,0,30,0.9)
  );

  backdrop-filter: blur(10px);

  box-shadow:
    0 0 20px rgba(255,0,80,0.4),
    inset 0 0 10px rgba(255,0,80,0.2);

  border-right:1px solid rgba(255,0,80,0.3);
}

.menu{list-style:none;padding:0;}
.menu li{
  padding:10px;
  cursor:pointer;
  border-radius:6px;
}
.menu li:hover{
  background:rgba(255,255,255,0.2);
  box-shadow:0 0 10px rgba(255,0,80,0.5);
  transform:translateX(5px);
}

.logout{
  margin-top:auto;
  background:#e74c3c;
  padding:10px;
  text-align:center;
  border-radius:6px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* TOP ROW */
.top-row{
  display:flex;
  gap:20px;
  margin-top:15px;
}

.welcome-box{
  flex:2;
  padding:20px;
  border-radius:15px;
  background: rgba(238,32,78,0.2);
  border:1px solid #EE204E;
  box-shadow:0 0 20px #EE204E;
}

.birthday{
  flex:1;
  padding:20px;
  border-radius:15px;
  text-align:center;
  background: rgba(242,0,60,0.2);
  border:1px solid #F2003C;
  box-shadow:0 0 15px #F2003C;
}

/* SEARCH */
.search-box input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:15px;
}

/* ANNOUNCE */
.announce{
  margin-top:20px;
  background: rgba(255,215,0,0.15);
  padding:15px;
  border-radius:10px;
  border:1px solid #FFD700;
  box-shadow:0 0 10px #FFD700;

  overflow:visible; /* 🔥 IMPORTANT */
}

.announce-item{
  margin-top:10px;
  padding:20px;
  border-radius:10px;
  background: rgba(255,215,0,0.25);
  text-align:center;
  position:relative;
  font-size:18px;
  font-weight:bold;

  padding-right:20px;
}

/* 🔥 BUTTONS OUTSIDE */
.announce-actions{
  position:absolute;
  top:50%;
  right:-90px;
  transform:translateY(-50%);
}

.announce-actions button{
  display:block;
  margin:4px 0;
  width:70px;
  border:none;
  border-radius:5px;
  padding:4px;
  cursor:pointer;
  font-size:11px;
}

.edit-btn{background:#3498db;color:white;}
.delete-btn{background:#e74c3c;color:white;}

/* POPUP */
#empPopup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px #00c6ff;
  width:320px;
}

/* BADGE */
.badge{
  background:red;
  padding:2px 6px;
  border-radius:10px;
  font-size:12px;
}
</style>

<script>
if(localStorage.getItem("loggedIn")!=="true"){
  window.location.href="login.html";
}
</script>

</head>

<body>

<div class="sidebar">
<h3>HR SYSTEM</h3>

<ul class="menu">
<li onclick="goPage('employee.html')">Employee</li>
<li onclick="goPage('attendance.html')">Attendance</li>
<li onclick="goPage('payroll.html')">Payroll</li>
<li onclick="goPage('payslip.html')">Payslip</li>
<li onclick="goPage('admin-requests.html')">📋 Requests</li>
<li onclick="goPage('settings.html')">⚙️ Settings</li>
</ul>

<div class="logout" onclick="logout()">Logout</div>
</div>

<div class="main">

<h2>Dashboard</h2>

<div class="top-row">
<div class="welcome-box">
<h2>Hi, Welcome 👋</h2>
<p>Have a nice day!</p>
</div>

<div class="birthday">
<h3>🎂 Birthday Today</h3>
<div id="bdayList"></div>
</div>
</div>

<div class="search-box">
<input id="searchEmp" placeholder="Search employee..." onkeyup="searchEmployee()">
<div id="searchResult"></div>
</div>

<div class="announce">
<h3>📢 Announcements</h3>

<input id="announceInput" placeholder="Enter...">
<button onclick="addAnnouncement()">Post</button>

<div id="announceList"></div>
</div>

</div>

<!-- POPUP -->
<div id="empPopup">
<div class="popup-box">
<h3>Employee Info</h3>
<div id="empDetails"></div>
<button onclick="closeEmp()">Close</button>
</div>
</div>

<script>

function goPage(p){window.location.href=p;}
function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href="login.html";
}

/* SEARCH */
function searchEmployee(){
  let keyword = searchEmp.value.toLowerCase();
  let emp = JSON.parse(localStorage.getItem("employees"))||[];

  searchResult.innerHTML="";
  emp.forEach(e=>{
    if((e.fname+" "+e.lname).toLowerCase().includes(keyword)){
      searchResult.innerHTML+=`
      <div onclick="showEmp('${e.fname}','${e.lname}')"
      style="padding:5px;background:#333;margin-top:5px;cursor:pointer;">
      ${e.fname} ${e.lname}
      </div>`;
    }
  });
}

function showEmp(fname,lname){
  let emp = JSON.parse(localStorage.getItem("employees"))||[];
  let e = emp.find(x=>x.fname===fname && x.lname===lname);
  if(!e)return;

  empDetails.innerHTML=`
  <p><b>Name:</b> ${e.fname} ${e.lname}</p>
  <p><b>Position:</b> ${e.position||""}</p>
  <p><b>ID:</b> ${e.empId||""}</p>
  <p><b>Birthday:</b> ${e.birthdate||"-"}</p>
  <p><b>SSS:</b> ${e.sss||"-"}</p>
  <p><b>PhilHealth:</b> ${e.philhealth||"-"}</p>
  <p><b>Pag-IBIG:</b> ${e.pagibig||"-"}</p>
  `;

  empPopup.style.display="flex";
}

function closeEmp(){
  empPopup.style.display="none";
}

/* ANNOUNCEMENT */
let announcements = JSON.parse(localStorage.getItem("announcements"))||[];

function addAnnouncement(){
  if(!announceInput.value)return;

  announcements.push({text:announceInput.value});
  localStorage.setItem("announcements",JSON.stringify(announcements));
  announceInput.value="";
  loadAnnouncements();
}

function loadAnnouncements(){
  announceList.innerHTML="";
  announcements.forEach((a,i)=>{
    announceList.innerHTML+=`
    <div class="announce-item">
      <div class="announce-actions">
        <button class="edit-btn" onclick="editAnnouncement(${i})">Edit</button>
        <button class="delete-btn" onclick="deleteAnnouncement(${i})">Delete</button>
      </div>
      ${a.text}
    </div>`;
  });
}

function editAnnouncement(i){
  let t=prompt("Edit:",announcements[i].text);
  if(t){
    announcements[i].text=t;
    localStorage.setItem("announcements",JSON.stringify(announcements));
    loadAnnouncements();
  }
}

function deleteAnnouncement(i){
  if(confirm("Delete?")){
    announcements.splice(i,1);
    localStorage.setItem("announcements",JSON.stringify(announcements));
    loadAnnouncements();
  }
}

/* BIRTHDAY */
function loadBirthday(){
  let emp = JSON.parse(localStorage.getItem("employees"))||[];
  let today = new Date().toISOString().slice(5,10);

  let b = emp.filter(e=>e.birthdate && e.birthdate.slice(5,10)===today);
  bdayList.innerHTML = b.length ? b.map(e=>e.fname+" "+e.lname).join("<br>") : "No birthday";
}

loadAnnouncements();
loadBirthday();

</script>

</body>
</html>
