<!DOCTYPE html>
<html>
<head>
  <title>HR System Dashboard</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* WRAPPER */
.wrapper{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:rgba(0,0,0,0.7);
  padding:20px;
}

.sidebar h3{
  margin-bottom:20px;
}

.menu{
  list-style:none;
  padding:0;
}

.menu li{
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
  cursor:pointer;
}

.menu li:hover{
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  position:relative;
}

/* LOGOUT */
.logout{
  margin-top:20px;
  background:#e74c3c;
  padding:10px;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
}

/* 🎂 SMALL RIGHT BOX */
.bday-box{
  position:absolute;
  top:20px;
  right:20px;
  width:260px;
  height:260px;
  overflow:auto;

  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:12px;
}

/* CARD */
.bday-card{
  background:#e6f4ea;
  padding:8px;
  border-radius:10px;
  text-align:center;
  color:#2c3e50;
  margin-bottom:8px;
}

/* AVATAR */
.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#2ecc71;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-size:14px;
}

/* TEXT */
.bday-name{
  font-size:12px;
  font-weight:bold;
}

.bday-date{
  font-size:11px;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}
</script>

</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>HR System</h3>

  <ul class="menu">
    <li onclick="goPage('employee.html')">👨‍💼 Employee</li>
    <li onclick="goPage('attendance.html')">🕒 Attendance</li>
    <li onclick="goPage('payroll.html')">💰 Payroll</li>
    <li onclick="goPage('payslip.html')">🧾 Payslip</li>
  </ul>

  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main">

<h2>Dashboard</h2>

<!-- 🎂 RIGHT SIDE BOX -->
<div class="bday-box">
  <h4>🎉 Birthdays</h4>
  <div id="bdayList"></div>
</div>

</div>
</div>

<script>

/* NAV */
function goPage(p){
  window.location.href = p;
}

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

/* 🎂 BIRTHDAY */
function loadBirthday(){
  let employees = JSON.parse(localStorage.getItem("employees")) || [];
  let box = document.getElementById("bdayList");

  let today = new Date();
  let list = [];

  employees.forEach(e=>{
    if(!e.birthdate) return;

    let b = new Date(e.birthdate);
    let thisYear = new Date(today.getFullYear(), b.getMonth(), b.getDate());

    let diff = Math.ceil((thisYear - today)/(1000*60*60*24));

    if(diff >= 0 && diff <= 30){
      list.push({
        name: e.fname + " " + e.lname,
        date: thisYear,
        diff
      });
    }
  });

  list.sort((a,b)=>a.diff-b.diff);

  box.innerHTML = "";

  list.forEach(e=>{
    let initials = e.name.split(" ").map(n=>n[0]).join("");

    box.innerHTML += `
      <div class="bday-card">
        <div class="avatar">${initials}</div>
        <div class="bday-name">${e.name}</div>
        <div class="bday-date">${e.date.toLocaleDateString()}</div>
      </div>
    `;
  });

  if(list.length === 0){
    box.innerHTML = "No birthdays 🎈";
  }
}

loadBirthday();

</script>

</body>
</html>
