<!DOCTYPE html>
<html>
<head>
  <title>HR Management Dashboard</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  position: relative;
  color: white;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.5)
  );
  z-index: -1;
}

/* WRAPPER */
.wrapper {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  height: calc(100vh - 40px);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* TITLE */
.sidebar h2 {
  margin-bottom: 30px;
}

/* MENU */
.menu {
  list-style: none;
  padding: 0;
}

.menu li {
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.menu li:hover {
  background: rgba(255,255,255,0.2);
}

/* LOGOUT */
.logout {
  margin-top: 30px;
  background: #e74c3c;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h2 {
  margin: 0;
}

/* GRID */
.container {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.15);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  font-size: 16px;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.25);
}

/* ICON */
.icon {
  font-size: 30px;
  display: block;
  margin-bottom: 10px;
}

/* COLORS */
.emp { border-top: 4px solid #2ecc71; }
.att { border-top: 4px solid #f1c40f; }
.pay { border-top: 4px solid #3498db; }
.payslip { border-top: 4px solid #9b59b6; }
.history { border-top: 4px solid #e67e22; }

</style>

<script>
// LOGIN PROTECTION
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>HR System</h2>

    <ul class="menu">
      <li onclick="goPage('index.html')">🏠 Dashboard</li>
      <li onclick="goPage('employee.html')">👨‍💼 Employees</li>
      <li onclick="goPage('attendance.html')">🕒 Attendance</li>
      <li onclick="goPage('payroll.html')">💰 Payroll</li>
      <li onclick="goPage('payslip.html')">🧾 Payslips</li>
      <li onclick="goPage('payroll-history.html')">📄 History</li>
    </ul>

    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <h2>Dashboard</h2>
      <span>Welcome, Admin 👋</span>
    </div>

    <div class="container">

      <div class="card emp" onclick="goPage('employee.html')">
        <span class="icon">👨‍💼</span>
        Employees
      </div>

      <div class="card att" onclick="goPage('attendance.html')">
        <span class="icon">🕒</span>
        Attendance
      </div>

      <div class="card pay" onclick="goPage('payroll.html')">
        <span class="icon">💰</span>
        Payroll
      </div>

      <div class="card payslip" onclick="goPage('payslip.html')">
        <span class="icon">🧾</span>
        Payslips
      </div>

      <div class="card history" onclick="goPage('payroll-history.html')">
        <span class="icon">📄</span>
        Payroll History
      </div>

    </div>

  </div>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function goPage(page){
  window.location.href = page;
}
</script>

</body>
</html>
