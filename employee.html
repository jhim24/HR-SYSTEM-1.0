<!DOCTYPE html>
<html>
<head>
<title>Employee Masterlist</title>

<style>
body{
  font-family:Arial;
  background:#0f2027;
  color:white;
  padding:20px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:10px;
}

input,select{
  width:100%;
  padding:8px;
  margin-top:8px;
  border:none;
  border-radius:5px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#e6f2ff;
  color:black;
}

th,td{
  border:1px solid #999;
  padding:6px;
  text-align:center;
  white-space:nowrap;
}
</style>

</head>

<body>

<h2>Employee Masterlist</h2>

<div class="box">

<input id="fname" placeholder="First Name">
<input id="mname" placeholder="Middle Name">
<input id="lname" placeholder="Last Name">

<input id="birthdate" type="date">
<input id="age" placeholder="Age">

<input id="address" placeholder="Address">

<select id="bank">
<option>BDO</option>
<option>BPI</option>
<option>Metrobank</option>
</select>

<input id="bankAccount" placeholder="Bank Account">
<input id="empid" placeholder="Employee ID">

<select id="govType">
<option>UMID</option>
<option>Passport</option>
</select>

<input id="sss" placeholder="SSS">
<input id="philhealth" placeholder="PhilHealth">
<input id="pagibig" placeholder="Pag-IBIG">

<select id="position">
<option>Admin</option>
<option>Cashier</option>
<option>Waiter</option>
<option>Waitress</option>
<option>Manager</option>
<option>Supervisor</option>
</select>

<button onclick="saveEmployee()">Save Employee</button>

</div>

<table>
<thead>
<tr>
<th>First</th>
<th>Middle</th>
<th>Last</th>
<th>Position</th>
<th>SSS</th>
<th>PhilHealth</th>
<th>Pag-IBIG</th>
</tr>
</thead>
<tbody id="empTable"></tbody>
</table>

<script>

/* STORAGE */
let employees = JSON.parse(localStorage.getItem("employees")) || [];

/* SAVE */
function saveEmployee(){

  let emp = {
    fname: fname.value,
    mname: mname.value,
    lname: lname.value,
    birthdate: birthdate.value,
    age: age.value,
    address: address.value,
    bank: bank.value,
    bankAccount: bankAccount.value,
    empid: empid.value,
    govType: govType.value,
    sss: sss.value,
    philhealth: philhealth.value,
    pagibig: pagibig.value,
    position: position.value
  };

  employees.push(emp);

  localStorage.setItem("employees", JSON.stringify(employees));

  loadEmployees();
}

/* LOAD */
function loadEmployees(){

  empTable.innerHTML="";

  employees.forEach(e=>{

    empTable.innerHTML += `
    <tr>
      <td>${e.fname}</td>
      <td>${e.mname}</td>
      <td>${e.lname}</td>
      <td>${e.position}</td>
      <td>${e.sss}</td>
      <td>${e.philhealth}</td>
      <td>${e.pagibig}</td>
    </tr>`;
  });

}

/* AUTO LOAD */
loadEmployees();

</script>

</body>
</html>
