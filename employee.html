<!DOCTYPE html>
<html>
<head>
  <title>Employee System</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #0f2027, #2c5364, #00c9ff);
  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* GRID */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* BUTTONS */
button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.save { background: #2ecc71; color: white; }
.update { background: #f39c12; color: white; }
.cancel { background: #7f8c8d; color: white; }
.delete { background: #e74c3c; color: white; }

/* TABLE */
.table-box {
  background: white;
  border-radius: 10px;
  padding: 10px;
  color: black;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #2ecc71;
  color: white;
}

th, td {
  padding: 8px;
  text-align: center;
  font-size: 12px;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<h2>EMPLOYEE REGISTRATION</h2>

<div class="card">
  <div class="form-grid">

    <input id="fname" placeholder="First Name">
    <input id="mname" placeholder="Middle Name">
    <input id="lname" placeholder="Last Name">

    <input id="age" placeholder="Age" readonly>
    <input id="address" placeholder="Address">
    <input type="date" id="birthdate" onchange="computeAge()">

    <select id="bank">
      <option value="">Select Bank</option>
      <option>BPI</option>
      <option>BDO</option>
      <option>Metrobank</option>
      <option>Landbank</option>
    </select>

    <input id="bankacc" placeholder="Bank Account Number">
    <input id="empid" placeholder="Employee ID">

    <input id="passport" placeholder="Passport Number">
    <input id="philhealth" placeholder="PhilHealth Number">
    <input id="pagibig" placeholder="Pag-IBIG Number">

    <input id="sss" placeholder="SSS Number">
    <input id="healthcard" placeholder="Health Card">

    <!-- BUTTONS -->
    <button class="save" onclick="addEmployee()">Save</button>
    <button class="update" onclick="updateEmployee()" id="updateBtn" style="display:none;">Update</button>
    <button class="cancel" onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancel</button>

  </div>
</div>

<div class="table-box">
  <table>
    <thead>
      <tr>
        <th>First</th>
        <th>Middle</th>
        <th>Last</th>
        <th>Age</th>
        <th>Bank</th>
        <th>Emp ID</th>
        <th>SSS</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let editIndex = -1;

/* AGE */
function computeAge() {
  let b = birthdate.value;
  if(!b) return;

  let today = new Date();
  let birth = new Date(b);

  let ageVal = today.getFullYear() - birth.getFullYear();
  let m = today.getMonth() - birth.getMonth();

  if(m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
    ageVal--;
  }

  age.value = ageVal;
}

/* SAVE */
function addEmployee() {
  let emp = getFormData();

  if(emp.fname === "" || emp.empid === "") {
    alert("Required fields!");
    return;
  }

  employees.push(emp);
  save();
  display();
  clearForm();
}

/* EDIT */
function editEmployee(i) {
  let e = employees[i];

  fname.value = e.fname;
  mname.value = e.mname;
  lname.value = e.lname;
  age.value = e.age;
  address.value = e.address;
  birthdate.value = e.birthdate;
  bank.value = e.bank;
  bankacc.value = e.bankacc;
  empid.value = e.empid;
  passport.value = e.passport;
  philhealth.value = e.philhealth;
  pagibig.value = e.pagibig;
  sss.value = e.sss;
  healthcard.value = e.healthcard;

  editIndex = i;

  updateBtn.style.display = "inline-block";
  cancelBtn.style.display = "inline-block";
}

/* UPDATE */
function updateEmployee() {
  if(editIndex === -1) return;

  employees[editIndex] = getFormData();

  save();
  display();
  cancelEdit();
}

/* CANCEL */
function cancelEdit() {
  editIndex = -1;
  clearForm();

  updateBtn.style.display = "none";
  cancelBtn.style.display = "none";
}

/* DELETE */
function del(i) {
  if(confirm("Delete?")) {
    employees.splice(i,1);
    save();
    display();
  }
}

/* DISPLAY */
function display() {
  table.innerHTML = "";

  employees.forEach((e,i) => {
    table.innerHTML += `
      <tr>
        <td>${e.fname}</td>
        <td>${e.mname}</td>
        <td>${e.lname}</td>
        <td>${e.age}</td>
        <td>${e.bank}</td>
        <td>${e.empid}</td>
        <td>${e.sss}</td>
        <td>
          <button onclick="editEmployee(${i})">Edit</button>
          <button class="delete" onclick="del(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* HELPERS */
function getFormData() {
  return {
    fname: fname.value,
    mname: mname.value,
    lname: lname.value,
    age: age.value,
    address: address.value,
    birthdate: birthdate.value,
    bank: bank.value,
    bankacc: bankacc.value,
    empid: empid.value,
    passport: passport.value,
    philhealth: philhealth.value,
    pagibig: pagibig.value,
    sss: sss.value,
    healthcard: healthcard.value
  };
}

function save() {
  localStorage.setItem("employees", JSON.stringify(employees));
}

function clearForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  bank.value = "";
}

/* LOAD */
display();
</script>

</body>
</html>
