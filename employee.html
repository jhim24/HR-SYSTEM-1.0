<!DOCTYPE html>
<html>
<head>
  <title>Employee Masterlist</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* WRAPPER */
.wrapper {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: rgba(0,0,0,0.6);
  padding: 25px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.menu {
  list-style: none;
  padding: 0;
}

.menu li {
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
  cursor: pointer;
}

.menu li:hover {
  background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
  flex: 1;
  padding: 25px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* TABLE CONTAINER */
.table-box {
  margin-top: 20px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 15px;
  backdrop-filter: blur(8px);
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px; /* mas maliit */
}

/* HEADER */
th {
  text-align: left;
  padding: 8px;
  background: rgba(255,255,255,0.2);
}

/* ROW */
td {
  padding: 6px 8px; /* mas maliit row height */
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* HOVER */
tr:hover {
  background: rgba(255,255,255,0.1);
}

/* BUTTON */
.btn {
  padding: 4px 8px;
  font-size: 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.edit {
  background: #3498db;
  color: white;
}

.delete {
  background: #e74c3c;
  color: white;
}

/* LOGOUT */
.logout {
  margin-top: 20px;
  background: #e74c3c;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

</style>

<script>
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>HR System</h2>

    <ul class="menu">
      <li onclick="goPage('index.html')">🏠 Dashboard</li>
      <li onclick="goPage('employee.html')">👨‍💼 Employees</li>
      <li onclick="goPage('attendance.html')">🕒 Attendance</li>
      <li onclick="goPage('payroll.html')">💰 Payroll</li>
      <li onclick="goPage('payslip.html')">🧾 Payslips</li>
      <li onclick="goPage('payroll-history.html')">📄 History</li>
    </ul>

    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <h2>Employee Masterlist</h2>
    </div>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Position</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>

          <tr>
            <td>Juan Dela Cruz</td>
            <td>HR Staff</td>
            <td>HR</td>
            <td>15000</td>
            <td>
              <button class="btn edit">Edit</button>
              <button class="btn delete">Delete</button>
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>

</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function goPage(page){
  window.location.href = page;
}
</script>

</body>
</html>
