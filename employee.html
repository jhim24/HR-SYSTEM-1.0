<!DOCTYPE html>
<html>
<head>
  <title>Employee Masterlist</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* WRAPPER */
.wrapper {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: rgba(0,0,0,0.6);
  padding: 20px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto; /* SCROLL */
}

/* FORM BOX */
.form-box {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* GRID FORM */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 8px;
}

/* INPUT */
input, select {
  padding: 6px;
  border-radius: 6px;
  border: none;
  font-size: 12px;
}

/* BUTTON */
.add-btn {
  margin-top: 10px;
  padding: 8px;
  background: #2ecc71;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* TABLE */
.table-box {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

/* BUTTON */
.btn {
  padding: 3px 6px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.delete { background: #e74c3c; color: white; }

</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>HR System</h3>
</div>

<!-- MAIN -->
<div class="main">

<h2>Employee Masterlist</h2>

<!-- FORM -->
<div class="form-box">
  <div class="form-grid">

    <input id="fname" placeholder="First Name">
    <input id="mname" placeholder="Middle Name">
    <input id="lname" placeholder="Last Name">

    <input type="date" id="birthdate" onchange="calcAge()">
    <input id="age" placeholder="Age" readonly>

    <input id="address" placeholder="Address">

    <select id="bank">
      <option>Bank Name</option>
      <option>BPI</option>
      <option>BDO</option>
      <option>Metrobank</option>
      <option>Landbank</option>
    </select>

    <input id="bankAcc" placeholder="Bank Account">

    <input id="empId" placeholder="Employee ID">

    <select id="govId">
      <option>Government ID</option>
      <option>Passport</option>
      <option>Driver License</option>
      <option>National ID</option>
    </select>

    <input id="sss" placeholder="SSS">
    <input id="philhealth" placeholder="PhilHealth">
    <input id="pagibig" placeholder="Pag-IBIG">
    <input id="healthcard" placeholder="Health Card">

    <select id="position">
      <option>Position</option>
      <option>Admin</option>
      <option>Cashier</option>
      <option>Waiter</option>
      <option>Waitress</option>
      <option>Manager</option>
      <option>Supervisor</option>
    </select>

  </div>

  <button class="add-btn" onclick="addEmployee()">Add Employee</button>
</div>

<!-- TABLE -->
<div class="table-box">
<table id="empTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>Position</th>
      <th>Bank</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

</div>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];

// AUTO AGE
function calcAge() {
  let birth = new Date(document.getElementById("birthdate").value);
  let today = new Date();
  let age = today.getFullYear() - birth.getFullYear();
  document.getElementById("age").value = age;
}

// ADD
function addEmployee() {
  let emp = {
    name: fname.value + " " + mname.value + " " + lname.value,
    age: age.value,
    position: position.value,
    bank: bank.value
  };

  employees.push(emp);
  localStorage.setItem("employees", JSON.stringify(employees));
  renderTable();
}

// DELETE
function deleteEmp(i) {
  employees.splice(i,1);
  localStorage.setItem("employees", JSON.stringify(employees));
  renderTable();
}

// RENDER
function renderTable() {
  let tbody = document.querySelector("#empTable tbody");
  tbody.innerHTML = "";

  employees.forEach((e,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${e.name}</td>
        <td>${e.age}</td>
        <td>${e.position}</td>
        <td>${e.bank}</td>
        <td><button class="btn delete" onclick="deleteEmp(${i})">Delete</button></td>
      </tr>
    `;
  });
}

renderTable();
</script>

</body>
</html>
