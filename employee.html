<!DOCTYPE html>
<html>
<head>
  <title>Employee Masterlist</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* WRAPPER */
.wrapper {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: rgba(0,0,0,0.6);
  padding: 25px;
}

.menu {
  list-style: none;
  padding: 0;
}

.menu li {
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
  cursor: pointer;
}

.menu li:hover {
  background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
  flex: 1;
  padding: 25px;
}

/* FORM BOX */
.form-box {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
  backdrop-filter: blur(8px);
}

/* INPUTS */
input {
  padding: 6px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
}

/* BUTTON */
.add-btn {
  padding: 6px 12px;
  border: none;
  background: #2ecc71;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* TABLE */
.table-box {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 15px;
  backdrop-filter: blur(8px);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  text-align: left;
  padding: 8px;
  background: rgba(255,255,255,0.2);
}

td {
  padding: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

tr:hover {
  background: rgba(255,255,255,0.1);
}

/* ACTION BUTTONS */
.btn {
  padding: 3px 6px;
  font-size: 11px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.edit { background: #3498db; color: white; }
.delete { background: #e74c3c; color: white; }

/* LOGOUT */
.logout {
  margin-top: 20px;
  background: #e74c3c;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

</style>

<script>
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>HR System</h2>

    <ul class="menu">
      <li onclick="goPage('index.html')">🏠 Dashboard</li>
      <li onclick="goPage('employee.html')">👨‍💼 Employees</li>
      <li onclick="goPage('attendance.html')">🕒 Attendance</li>
      <li onclick="goPage('payroll.html')">💰 Payroll</li>
      <li onclick="goPage('payslip.html')">🧾 Payslips</li>
      <li onclick="goPage('payroll-history.html')">📄 History</li>
    </ul>

    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>Employee Masterlist</h2>

    <!-- FORM -->
    <div class="form-box">
      <input type="text" id="name" placeholder="Name">
      <input type="text" id="position" placeholder="Position">
      <input type="text" id="department" placeholder="Department">
      <input type="number" id="salary" placeholder="Salary">
      <button class="add-btn" onclick="addEmployee()">Add</button>
    </div>

    <!-- TABLE -->
    <div class="table-box">
      <table id="empTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Position</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];

function renderTable() {
  let tbody = document.querySelector("#empTable tbody");
  tbody.innerHTML = "";

  employees.forEach((emp, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${emp.name}</td>
        <td>${emp.position}</td>
        <td>${emp.department}</td>
        <td>${emp.salary}</td>
        <td>
          <button class="btn delete" onclick="deleteEmp(${index})">Delete</button>
        </td>
      </tr>
    `;
  });
}

function addEmployee() {
  let emp = {
    name: document.getElementById("name").value,
    position: document.getElementById("position").value,
    department: document.getElementById("department").value,
    salary: document.getElementById("salary").value
  };

  employees.push(emp);
  localStorage.setItem("employees", JSON.stringify(employees));

  renderTable();
}

function deleteEmp(i) {
  employees.splice(i,1);
  localStorage.setItem("employees", JSON.stringify(employees));
  renderTable();
}

function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function goPage(page){
  window.location.href = page;
}

renderTable();
</script>

</body>
</html>
