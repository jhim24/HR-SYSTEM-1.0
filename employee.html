<!DOCTYPE html>
<html>
<head>
  <title>Employee System</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #0f2027, #2c5364, #00c9ff);
  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* SECTION */
.section {
  grid-column: 1 / -1;
  font-weight: bold;
  margin-top: 10px;
}

/* GRID */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

input[readonly] {
  background: #ddd;
}

/* BUTTON */
button {
  grid-column: 1 / -1;
  padding: 14px;
  background: #2ecc71;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #27ae60;
}

/* TABLE */
.table-box {
  background: white;
  border-radius: 10px;
  padding: 10px;
  color: black;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #2ecc71;
  color: white;
}

th, td {
  padding: 8px;
  text-align: center;
  font-size: 12px;
}

.delete {
  background: #e74c3c;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
}
</style>

<script>
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<h2>EMPLOYEE REGISTRATION</h2>

<div class="card">
  <div class="form-grid">

    <div class="section">Personal Information</div>

    <input id="fname" placeholder="First Name">
    <input id="mname" placeholder="Middle Name">
    <input id="lname" placeholder="Last Name">

    <input id="age" placeholder="Age" readonly>
    <input id="address" placeholder="Address">
    <input type="date" id="birthdate" onchange="computeAge()">

    <div class="section">Bank Details</div>

    <select id="bank">
      <option value="">Select Bank</option>
      <option>BPI</option>
      <option>BDO</option>
      <option>Metrobank</option>
      <option>Landbank</option>
      <option>PNB</option>
    </select>

    <input id="bankacc" placeholder="Bank Account Number">
    <input id="empid" placeholder="Employee ID">

    <div class="section">Government IDs</div>

    <input id="passport" placeholder="Passport Number">
    <input id="philhealth" placeholder="PhilHealth Number">
    <input id="pagibig" placeholder="Pag-IBIG Number">

    <input id="sss" placeholder="SSS Number">
    <input id="healthcard" placeholder="Health Card">

    <button onclick="addEmployee()">Save Employee</button>

  </div>
</div>

<div class="table-box">
  <table>
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Age</th>
        <th>Bank</th>
        <th>Emp ID</th>
        <th>SSS</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];

/* AUTO AGE */
function computeAge() {
  let birthdate = document.getElementById("birthdate").value;
  if(!birthdate) return;

  let today = new Date();
  let birth = new Date(birthdate);

  let age = today.getFullYear() - birth.getFullYear();
  let m = today.getMonth() - birth.getMonth();

  if(m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
    age--;
  }

  document.getElementById("age").value = age;
}

/* SAVE EMPLOYEE */
function addEmployee() {
  let emp = {
    fname: fname.value,
    mname: mname.value,
    lname: lname.value,
    age: age.value,
    bank: bank.value,
    empid: empid.value,
    sss: sss.value
  };

  if(emp.fname === "" || emp.lname === "" || emp.empid === "") {
    alert("Please fill required fields!");
    return;
  }

  employees.push(emp);
  localStorage.setItem("employees", JSON.stringify(employees));

  display();
  clearForm();
}

/* DISPLAY */
function display() {
  let table = document.getElementById("table");
  table.innerHTML = "";

  employees.forEach((e, i) => {

    let fullName = e.fname + " " + (e.mname ? e.mname + " " : "") + e.lname;

    table.innerHTML += `
      <tr>
        <td>${fullName}</td>
        <td>${e.age}</td>
        <td>${e.bank}</td>
        <td>${e.empid}</td>
        <td>${e.sss}</td>
        <td><button class="delete" onclick="del(${i})">Delete</button></td>
      </tr>
    `;
  });
}

/* DELETE */
function del(i) {
  if(confirm("Delete this employee?")) {
    employees.splice(i, 1);
    localStorage.setItem("employees", JSON.stringify(employees));
    display();
  }
}

/* CLEAR FORM */
function clearForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  document.getElementById("bank").value = "";
}

/* LOAD DATA */
display();
</script>

</body>
</html>
